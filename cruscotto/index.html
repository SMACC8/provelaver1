<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Cruscotto · ProVela</title>
<style>
:root{
  --bg:#060e18; --bezel-hi:#2c4256; --bezel-lo:#0c1b28;
  --dp:#040c14; --ink:#deedf5; --sub:#4a6a82; --dim:#1a2e3e;
  --teal:#2BD9C4; --amber:#FFC24B; --coral:#FF6B6B; --green:#46d68a;
  --mono:ui-monospace,"SF Mono","Roboto Mono",Menlo,Consolas,monospace;
  --sans:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--mono);color:var(--ink);background:var(--bg);
  display:flex;flex-direction:column;height:100dvh;}

/* ── header ── */
header{flex:none;display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;background:linear-gradient(#0d1f30,#08151f);border-bottom:1px solid var(--dim);}
.hbrand{display:flex;align-items:center;gap:9px;}
.hbrand svg{flex-shrink:0;display:block;}
.back{display:flex;align-items:center;justify-content:center;width:26px;height:26px;
  border-radius:8px;color:var(--sub);text-decoration:none;font-size:20px;line-height:1;
  border:1px solid var(--dim);background:linear-gradient(#10243a,#080f19);}
.hboat{display:flex;flex-direction:column;line-height:1.25;}
.hboat b{color:var(--teal);font-size:14px;letter-spacing:.05em;}
.hboat small{color:var(--sub);font-size:11px;}
.src{display:flex;align-items:center;gap:7px;cursor:pointer;font-family:var(--mono);
  font-size:12px;padding:7px 12px;border-radius:999px;color:var(--ink);
  background:linear-gradient(#10243a,#080f19);border:1px solid var(--dim);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.1), 0 2px 6px -3px #000;}
.src .led{width:8px;height:8px;border-radius:50%;background:var(--amber);box-shadow:0 0 9px var(--amber);}
.src.real .led{background:var(--teal);box-shadow:0 0 9px var(--teal);}
.src small{color:var(--sub);}

/* ── toolbar ── */
.toolbar{flex:none;display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:8px 12px;background:#08121c;border-bottom:1px solid var(--dim);}
.seg{display:flex;border:1px solid var(--dim);border-radius:9px;overflow:hidden;
  background:linear-gradient(#0c1b2a,#070f18);box-shadow:inset 0 1px 0 rgba(255,255,255,.05);}
.seg button{background:none;border:0;color:var(--sub);font-family:var(--mono);
  font-size:13px;font-weight:700;padding:7px 15px;cursor:pointer;letter-spacing:.04em;
  border-right:1px solid var(--dim);}
.seg button:last-child{border-right:0;}
.seg button.on{color:#060e18;background:linear-gradient(var(--teal),#1fb3a2);
  text-shadow:none;box-shadow:0 0 12px rgba(43,217,196,.35);}
.seg .cap{color:var(--sub);font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  padding:0 9px 0 2px;align-self:center;font-weight:400;}
.wind-src{display:flex;align-items:center;gap:7px;cursor:pointer;font-family:var(--mono);
  font-size:12px;padding:7px 11px;border-radius:999px;color:var(--ink);
  background:linear-gradient(#10243a,#080f19);border:1px solid var(--dim);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08);}
.wind-src .led{width:8px;height:8px;border-radius:50%;background:var(--amber);box-shadow:0 0 8px var(--amber);}
.wind-src[data-w="signalk"] .led{background:var(--teal);box-shadow:0 0 8px var(--teal);}
.wind-src[data-w="manual"] .led{background:var(--green);box-shadow:0 0 8px var(--green);}
.wind-src b{color:var(--ink);font-weight:700;}
.wind-src .wcap{color:var(--sub);}
.src .wcap{color:var(--sub);margin-right:5px;}

/* ── griglia campi ── */
main{flex:1;min-height:0;padding:10px;}
.grid{height:100%;display:grid;gap:9px;}
.grid.n2{grid-template-columns:1fr;grid-template-rows:1fr 1fr;}
.grid.n4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;}
.grid.n8{grid-template-columns:1fr 1fr;grid-template-rows:repeat(4,1fr);}
.grid.n5{grid-template-columns:1fr 1fr;grid-template-rows:1.35fr 1fr 1fr;}
.grid.n5 .compass{grid-column:1 / span 2;}
.grid.n3{grid-template-columns:1fr 1fr;grid-template-rows:3fr 1fr;}
.grid.n3 .compass{grid-column:1 / span 2;}
.slot.compass{cursor:pointer;}
.slot.compass .cwrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:10px;}

/* ── bezel + display ── */
.instr{position:relative;border-radius:11px;padding:4px;min-height:0;
  background:linear-gradient(148deg,var(--bezel-hi) 0%,#18303e 42%,var(--bezel-lo) 100%);
  box-shadow:0 8px 22px -12px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.14);}
.dp{height:100%;border-radius:8px;position:relative;overflow:hidden;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(0,8,20,.11) 2px,rgba(0,8,20,.11) 3px),var(--dp);
  box-shadow:inset 0 3px 9px rgba(0,0,0,.95),inset 0 0 0 1px rgba(255,255,255,.03);}
.viti{position:absolute;inset:0;pointer-events:none;z-index:2;}
.viti i{position:absolute;width:7px;height:7px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#3a5873 0%,#152538 100%);box-shadow:inset 0 1px 1px rgba(255,255,255,.2);}
.viti i:nth-child(1){top:7px;left:7px;} .viti i:nth-child(2){top:7px;right:7px;}
.viti i:nth-child(3){bottom:7px;left:7px;} .viti i:nth-child(4){bottom:7px;right:7px;}

.lbl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--teal);
  display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.lbl .sub2{color:var(--sub);letter-spacing:.1em;}
.est{font-size:9px;border:1px solid var(--amber);color:var(--amber);border-radius:3px;
  padding:1px 4px;letter-spacing:.05em;text-transform:none;}
.est.man{border-color:var(--green);color:var(--green);}
.est.na{border-color:var(--sub);color:var(--sub);opacity:.8;}
.numrow{display:flex;align-items:baseline;gap:5px;line-height:1;}
.num{font-variant-numeric:tabular-nums;letter-spacing:-.02em;font-weight:700;
  color:var(--ink);text-shadow:0 0 18px rgba(180,220,235,.14);}
.num.teal{color:var(--teal);text-shadow:0 0 20px rgba(43,217,196,.3);}
.num.amber{color:var(--amber);text-shadow:0 0 18px rgba(255,194,75,.28);}
.num.green{color:var(--green);text-shadow:0 0 18px rgba(70,214,138,.28);}
.num.coral{color:var(--coral);text-shadow:0 0 18px rgba(255,107,107,.28);}
.unit{color:var(--sub);font-weight:400;}
.side-tag{font-size:12px;padding:2px 7px;border-radius:5px;font-weight:700;letter-spacing:.04em;}
.side-tag.p{background:#451520;color:var(--coral);} .side-tag.s{background:#0c2f20;color:var(--green);}

/* campo: etichetta in alto, numero che riempie lo spazio (fit via JS) */
.slot{cursor:pointer;user-select:none;-webkit-user-select:none;transition:transform .1s;}
.slot.press{transform:scale(.975);}
.slot .dp{display:flex;flex-direction:column;padding:10px 13px 12px;}
.slot .lbl{margin-bottom:2px;flex:none;}
.grid.n8 .slot .lbl{font-size:9px;letter-spacing:.12em;}
.slot .numrow{flex:1;align-items:center;justify-content:center;overflow:hidden;}
.slot .num{font-size:40px;line-height:1;text-align:center;}   /* impostato da fit() */
.slot .unit{font-size:14px;}

/* ── foglio (bottom sheet) ── */
.sheet{position:fixed;inset:0;z-index:20;display:none;}
.sheet.on{display:block;}
.sheet-bg{position:absolute;inset:0;background:rgba(2,7,14,.66);backdrop-filter:blur(2px);}
.sheet-card{position:absolute;left:0;right:0;bottom:0;max-height:82%;overflow-y:auto;
  background:linear-gradient(#0e2036,#0a1626);border-top:1px solid #223a52;
  border-radius:18px 18px 0 0;padding:16px 16px calc(20px + env(safe-area-inset-bottom));
  box-shadow:0 -12px 40px -12px #000;transform:translateY(100%);transition:transform .26s cubic-bezier(.3,.7,.3,1);}
.sheet.on .sheet-card{transform:translateY(0);}
.sheet-grip{width:38px;height:4px;border-radius:2px;background:#2a4560;margin:0 auto 12px;}
.sheet-h{font-family:var(--sans);font-size:13px;color:var(--sub);letter-spacing:.04em;
  text-transform:uppercase;margin-bottom:12px;text-align:center;}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mbtn{text-align:left;background:linear-gradient(#0c1b2a,#08121e);border:1px solid var(--dim);
  border-radius:11px;padding:11px 12px;cursor:pointer;color:var(--ink);font-family:var(--mono);}
.mbtn:active{transform:scale(.97);}
.mbtn.on{border-color:var(--teal);box-shadow:0 0 0 1px var(--teal) inset;}
.mbtn .mb-lbl{font-size:13px;font-weight:700;}
.mbtn .mb-sub{font-size:10px;color:var(--sub);margin-top:2px;letter-spacing:.04em;}

/* manuale vento */
.wrow{display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:12px 4px;border-bottom:1px solid var(--dim);}
.wrow:last-of-type{border-bottom:0;}
.wlbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);}
.wlbl small{display:block;color:var(--sub);letter-spacing:.06em;margin-top:3px;text-transform:none;}
.stepper{display:flex;align-items:center;gap:8px;}
.stepper button{width:38px;height:38px;border-radius:10px;border:1px solid var(--dim);
  background:linear-gradient(#12263c,#0a1524);color:var(--ink);font-size:20px;cursor:pointer;
  font-family:var(--mono);box-shadow:inset 0 1px 0 rgba(255,255,255,.08);}
.stepper button:active{transform:scale(.94);}
.stepper input{width:78px;text-align:center;background:var(--dp);border:1px solid var(--dim);
  border-radius:9px;color:var(--ink);font-family:var(--mono);font-size:24px;font-weight:700;
  padding:6px 4px;outline:none;font-variant-numeric:tabular-nums;-moz-appearance:textfield;}
.stepper input::-webkit-outer-spin-button,.stepper input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.stepper .su{color:var(--sub);font-size:13px;width:20px;}
.sheet-done{width:100%;margin-top:16px;padding:13px;border-radius:12px;border:0;cursor:pointer;
  background:var(--teal);color:#060e18;font-family:var(--mono);font-size:14px;font-weight:700;letter-spacing:.03em;}

/* barra registrazione */
.recbar{flex:none;display:flex;align-items:center;gap:9px;padding:8px 12px calc(8px + env(safe-area-inset-bottom));
  background:linear-gradient(#0a1626,#070f18);border-top:1px solid var(--dim);}
.rec-wp{flex:1;min-width:0;font-size:11px;color:var(--sub);letter-spacing:.04em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rec-wp b{color:var(--teal);font-weight:700;}
.rec-btn{display:flex;align-items:center;gap:7px;cursor:pointer;font-family:var(--mono);
  font-size:13px;padding:9px 14px;border-radius:11px;color:var(--ink);
  background:linear-gradient(#12263c,#0a1524);border:1px solid var(--dim);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08);}
.rec-btn:active{transform:scale(.96);}
.rec-btn.trk .dot{width:9px;height:9px;border-radius:50%;background:var(--coral);box-shadow:0 0 8px var(--coral);}
.rec-btn.rec{border-color:var(--coral);color:var(--coral);}
.rec-btn.rec .dot{animation:blink 1s steps(2,start) infinite;}
@keyframes blink{50%{opacity:.25;}}

/* toast */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(16px);
  background:#0e2036;border:1px solid var(--dim);border-radius:999px;padding:9px 18px;
  font-family:var(--sans);font-size:12.5px;color:var(--ink);opacity:0;z-index:30;
  transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap;
  box-shadow:0 8px 24px -8px rgba(0,0,0,.8);}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<!-- ===== rf-topbar: barra fissa trasversale ProVela (inietta subito dopo <body>) ===== -->
<style>
.rf-topbar{position:fixed;top:0;left:0;right:0;height:40px;z-index:9000;display:flex;align-items:center;gap:10px;
  padding:0 10px;background:linear-gradient(#0c1c2e,#081521);border-bottom:1px solid #1a3248;
  font-family:ui-monospace,"SF Mono","Roboto Mono",Menlo,Consolas,monospace;color:#5a7a94;font-size:11.5px;
  letter-spacing:.02em;-webkit-user-select:none;user-select:none;box-shadow:0 2px 10px -6px rgba(0,0,0,.8);}
.rf-topbar a.rf-home{display:flex;align-items:center;justify-content:center;width:30px;height:30px;flex:none;
  border-radius:8px;background:rgba(43,217,196,.1);border:1px solid rgba(43,217,196,.35);text-decoration:none;}
.rf-topbar a.rf-home:active{transform:scale(.92);}
.rf-topbar .rf-dt{color:#deedf5;white-space:nowrap;}
.rf-topbar .rf-sun{display:none;}
.rf-topbar .rf-sun b{color:#FFC24B;font-weight:600;}
.rf-topbar .rf-pol{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:46%;color:#5a7a94;}
.rf-topbar .rf-pol b{color:#2BD9C4;font-weight:600;}
.rf-topbar .rf-pol .mod{color:#cfe2ee;}
.rf-topbar .rf-pol .pol{color:#FFC24B;font-weight:600;}
.rf-topbar .rf-pol .pol.warn{color:#FF6B6B;}
.rf-topbar .rf-spacer{flex:1;}
.rf-topbar .rf-status{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:44%;}
.rf-topbar .rf-status.wp b{color:#2BD9C4;font-weight:600;}
.rf-topbar .rf-status.rec{color:#FF6B6B;font-weight:600;}
.rf-topbar .rf-status .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#FF6B6B;
  margin-right:5px;vertical-align:middle;animation:rfblink 1s steps(2,start) infinite;}
@keyframes rfblink{50%{opacity:.25}}
body{padding-top:40px!important;}
@media (max-width:360px){.rf-topbar .rf-sun{display:none;}}
@media (max-width:480px){.rf-topbar .rf-pol .mod{display:none;}}
</style>
<div class="rf-topbar" role="banner">
  <a class="rf-home" href="../" aria-label="Torna al menu ProVela" title="Menu ProVela">
    <svg viewBox="0 0 64 64" width="19" height="19" aria-hidden="true"><path d="M32 8 L32 56 L10 56 Z" fill="#2BD9C4" opacity=".95"/><path d="M32 26 L54 56 L32 56 Z" fill="#2BD9C4" opacity=".45"/><line x1="32" y1="6" x2="32" y2="58" stroke="#1a4a42" stroke-width="3"/></svg>
  </a>
  <span class="rf-dt" id="rfDt">—</span>
  <span class="rf-sun" id="rfSun"></span>
  <span class="rf-pol" id="rfPol" title=""></span>
  <span class="rf-spacer"></span>
  <span class="rf-status" id="rfStatus"></span>
</div>
<script>
(function(){
  var D=["dom","lun","mar","mer","gio","ven","sab"], MO=["gen","feb","mar","apr","mag","giu","lug","ago","set","ott","nov","dic"];
  var DEFAULT=[45.65,13.77]; // Golfo di Trieste — default Alto Adriatico
  function coords(){try{var p=JSON.parse(localStorage.getItem("raffyca-pos")||"null");if(p&&isFinite(p.lat)&&isFinite(p.lon))return[p.lat,p.lon];}catch(e){}return DEFAULT;}
  // alba/tramonto — equazione del sole (nessuna rete, ~1 min di precisione)
  function sunTimes(date,lat,lon){
    var rad=Math.PI/180, deg=180/Math.PI, J2000=2451545;
    var dayMs=Date.UTC(date.getFullYear(),date.getMonth(),date.getDate());
    var n=Math.round(dayMs/86400000 - 0.5 + 2440588 - J2000 + 0.0008);
    var Jstar=n - lon/360;
    var M=(357.5291 + 0.98560028*Jstar)%360;
    var C=1.9148*Math.sin(M*rad)+0.02*Math.sin(2*M*rad)+0.0003*Math.sin(3*M*rad);
    var lam=(M+C+180+102.9372)%360;
    var Jtr=J2000 + Jstar + 0.0053*Math.sin(M*rad) - 0.0069*Math.sin(2*lam*rad);
    var dec=Math.asin(Math.sin(lam*rad)*Math.sin(23.44*rad));
    var co=(Math.sin(-0.833*rad)-Math.sin(lat*rad)*Math.sin(dec))/(Math.cos(lat*rad)*Math.cos(dec));
    if(co>1)return{rise:null,set:null}; if(co<-1)return{rise:null,set:null};
    var w=Math.acos(co)*deg;
    var toDate=function(J){return new Date((J-2440588+0.5)*86400000);};
    return{rise:toDate(Jtr-w/360),set:toDate(Jtr+w/360)};
  }
  function hhmm(d){return d?d.toLocaleTimeString("it",{hour:"2-digit",minute:"2-digit"}):"—";}
  var elDt=document.getElementById("rfDt"), elSun=document.getElementById("rfSun"), elSt=document.getElementById("rfStatus");
  var elPol=document.getElementById("rfPol");
  function esc(x){return String(x).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function polarLabel(){
    var p=null;try{p=JSON.parse(localStorage.getItem("raffyca-polar")||"null");}catch(e){}
    if(!p||!p.twa||!p.data||!p.twa.length)return{txt:"integrata",cls:"warn"};
    var m=p.meta||{};
    if(m.source==="generica"||m.generic)return{txt:(m.boat||"generica"),cls:"warn"};
    if(m.boat)return{txt:m.boat,cls:""};
    if(m.source==="csv")return{txt:"CSV",cls:""};
    return{txt:(m.source||"attiva"),cls:""};
  }
  function tickPolar(){
    if(!elPol)return;
    var pr=null;try{pr=JSON.parse(localStorage.getItem("raffyca-profile")||"null");}catch(e){}
    var boat=(pr&&pr.boat)||"",model=(pr&&pr.model)||"";
    var L=polarLabel();
    var h="";
    if(boat)h+='<b>'+esc(boat)+'</b>';
    if(model)h+=(h?" · ":"")+'<span class="mod">'+esc(model)+'</span>';
    h+=(h?" · ":"")+'<span class="pol '+L.cls+'">pol '+esc(L.txt)+'</span>';
    elPol.innerHTML=h;
    elPol.title=[boat,model,"polare: "+L.txt].filter(Boolean).join(" · ");
  }
  var sunDay="";
  function tickClock(){
    var now=new Date();
    elDt.textContent=D[now.getDay()]+" "+now.getDate()+" "+MO[now.getMonth()]+" · "+now.toLocaleTimeString("it",{hour:"2-digit",minute:"2-digit"});
    var key=now.toDateString();
    if(key!==sunDay){sunDay=key;var c=coords();var s=sunTimes(now,c[0],c[1]);elSun.innerHTML="&#9728; <b>"+hhmm(s.rise)+"</b> &nbsp;&#9790; <b>"+hhmm(s.set)+"</b>";}
  }
  function tickStatus(){
    var rec=null,id="";
    try{rec=JSON.parse(localStorage.getItem("raffyca-rec")||"null");}catch(e){}
    if(rec&&rec.on){elSt.className="rf-status rec";elSt.innerHTML='<span class="dot"></span>REC GPX'+(rec.pts?" · "+rec.pts+" pt":"");return;}
    try{id=localStorage.getItem("raffyca-active-wp")||"";}catch(e){}
    if(id){var w=null;try{w=(JSON.parse(localStorage.getItem("raffyca-waypoints")||"[]")).find(function(x){return x.id===id;});}catch(e){}
      if(w){elSt.className="rf-status wp";elSt.innerHTML="&#9873; WP: <b>"+w.name+"</b>";return;}}
    elSt.className="rf-status";elSt.textContent="";
  }
  tickClock();tickStatus();tickPolar();
  setInterval(tickClock,20000);
  setInterval(tickStatus,3000);
  setInterval(tickPolar,5000);
  window.addEventListener("storage",tickStatus);window.addEventListener("storage",tickPolar);
  document.addEventListener("visibilitychange",function(){if(!document.hidden){tickClock();tickStatus();tickPolar();}});
})();
</script>
<!-- ===== /rf-topbar ===== -->

<header>
  <div class="hbrand">
    <div class="hboat"><small id="profile">First 36.7 · polare ORC</small></div>
  </div>
  <button class="src" id="src">
    <span class="led"></span><span class="wcap">Dati</span><span id="srcTx">Stima</span><small id="srcSub">GPS + meteo</small>
  </button>
</header>

<div class="toolbar">
  <div class="seg" id="segLayout">
    <button data-n="2">2</button><button data-n="3">3</button><button data-n="4" class="on">4</button><button data-n="5">5</button><button data-n="8">8</button>
    <span class="cap">campi</span>
  </div>
  <button class="wind-src" id="windSrc" data-w="estimate">
    <span class="led"></span><span class="wcap">Vento</span><b id="windTx">Stima</b>
  </button>
</div>

<main><div class="grid n4" id="grid"></div></main>

<div class="recbar">
  <div class="rec-wp" id="recWp" style="flex:1"></div>
  <button class="rec-btn" id="btnWpt">＋ Waypoint</button>
  <button class="rec-btn trk" id="btnTrk"><span class="dot"></span><span id="trkTx">Traccia</span></button>
</div>

<!-- foglio: scelta grandezza -->
<div class="sheet" id="pick">
  <div class="sheet-bg" data-close></div>
  <div class="sheet-card">
    <div class="sheet-grip"></div>
    <div class="sheet-h">Grandezza da mostrare</div>
    <div class="mgrid" id="mgrid"></div>
  </div>
</div>

<!-- foglio: vento manuale -->
<div class="sheet" id="wsheet">
  <div class="sheet-bg" data-close></div>
  <div class="sheet-card">
    <div class="sheet-grip"></div>
    <div class="sheet-h">Vento manuale</div>
    <div class="wrow">
      <div class="wlbl">TWS<small>velocità vento reale</small></div>
      <div class="stepper">
        <button data-k="tws" data-d="-0.5">−</button>
        <input id="mwTws" type="number" step="0.5" inputmode="decimal"><span class="su">kt</span>
        <button data-k="tws" data-d="0.5">+</button>
      </div>
    </div>
    <div class="wrow">
      <div class="wlbl">TWD<small>direzione vento reale</small></div>
      <div class="stepper">
        <button data-k="twd" data-d="-5">−</button>
        <input id="mwTwd" type="number" step="5" inputmode="numeric"><span class="su">°</span>
        <button data-k="twd" data-d="5">+</button>
      </div>
    </div>
    <button class="sheet-done" data-close>Fatto</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
const $=id=>document.getElementById(id);
const reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
const pad3=n=>String(Math.round(n)).padStart(3,'0');

/* ── stato simulato ── */
const S={tws:14.2,twd:158,sog:6.7,cog:118,hdg:121,stw:6.9,dep:18.4,tmp:16.3,pol:91,
         xte:22,xside:1,brg:94,dtw:0.42,lat:45.6480,lon:13.7560};
let SRC='estimate';           // estimate | signalk  (i due metodi)
let WIND='estimate';          // estimate | signalk | manual
const MW={tws:12,twd:160};    // vento manuale

/* ── catalogo grandezze ── */
var HEEL={val:0,ready:false,_on:false};
function startHeel(){ if(HEEL._on)return; HEEL._on=true;
  window.addEventListener('deviceorientation',function(e){
    if(e.gamma==null)return; HEEL.ready=true; HEEL.val=HEEL.val+0.18*(e.gamma-HEEL.val);   /* smoothing EMA */
  });
}
function requestHeelPerm(){try{
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(function(r){if(r==='granted')startHeel();}).catch(function(){});
  } else { startHeel(); }
}catch(e){startHeel();}}
(function armHeel(){
  var needsPerm=(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function');
  if(!needsPerm){ startHeel(); return; }                 /* Android/desktop: avvio subito */
  /* iOS 13+: il permesso va chiesto su un gesto utente. Aggancio in fase di CATTURA
     cosi scatta al primo tocco anche se un bottone ferma la propagazione. */
  var done=false;
  function go(){ if(done)return; done=true; requestHeelPerm();
    ['pointerdown','touchend','click'].forEach(function(ev){window.removeEventListener(ev,go,true);}); }
  ['pointerdown','touchend','click'].forEach(function(ev){window.addEventListener(ev,go,true);});
})();
function cruPos(){try{var p=JSON.parse(localStorage.getItem('raffyca-pos')||'null');if(p&&isFinite(p.lat)&&isFinite(p.lon))return p;}catch(e){}return null;}
function fmtDM(v,hs){var h=v>=0?hs[0]:hs[1];v=Math.abs(v);var d=Math.floor(v),m=(v-d)*60;return d+'\u00b0'+m.toFixed(1)+"'"+h;}
function fmtHM(h){if(h==null||!isFinite(h))return '\u2014';var t=Math.round(h*60);return Math.floor(t/60)+':'+('0'+(t%60)).slice(-2);}
function fmtClk(d){return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);}
function sunTimes(date,lat,lon){var rad=Math.PI/180,deg=180/Math.PI,J2000=2451545;
  var n=Math.round(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate())/86400000-0.5+2440588-J2000+0.0008);
  var Js=n-lon/360,M=(357.5291+0.98560028*Js)%360,C=1.9148*Math.sin(M*rad)+0.02*Math.sin(2*M*rad)+0.0003*Math.sin(3*M*rad);
  var lam=(M+C+180+102.9372)%360,Jtr=J2000+Js+0.0053*Math.sin(M*rad)-0.0069*Math.sin(2*lam*rad);
  var dec=Math.asin(Math.sin(lam*rad)*Math.sin(23.44*rad)),co=(Math.sin(-0.833*rad)-Math.sin(lat*rad)*Math.sin(dec))/(Math.cos(lat*rad)*Math.cos(dec));
  if(co>1||co<-1)return{rise:null,set:null};var w=Math.acos(co)*deg,td=function(J){return new Date((J-2440588+0.5)*86400000);};
  return{rise:td(Jtr-w/360),set:td(Jtr+w/360)};}
const METRICS=[
  {id:'sog',lbl:'SOG',  sub:'vel. suolo', unit:'kt',color:'teal', fmt:E=>E.sog.toFixed(1)},
  {id:'cog',lbl:'COG',  sub:'rotta',      unit:'°', color:'',     fmt:E=>pad3(E.cog)},
  {id:'hdg',lbl:'Prua', sub:'HDG',        unit:'°', color:'',     fmt:E=>pad3(E.hdg)},
  {id:'stw',lbl:'Vel. barca',sub:'STW',   unit:'kt',color:'',     fmt:E=>E.stw.toFixed(1)},
  {id:'twa',lbl:'Angolo vento',sub:'TWA', unit:'°', color:'',     fmt:E=>Math.round(Math.abs(E.twa)),
    tag:E=>E.twa<0?{t:'◄ Sx',c:'p'}:{t:'Dx ►',c:'s'}},
  {id:'tws',lbl:'Vento reale',sub:'TWS',  unit:'kt',color:'amber',fmt:E=>E.tws.toFixed(1)},
  {id:'twd',lbl:'Direz. vento',sub:'TWD', unit:'°', color:'amber',fmt:E=>pad3(E.twd)},
  {id:'vmg',lbl:'VMG',  sub:'',           unit:'kt',color:'teal', fmt:E=>E.vmg.toFixed(1)},
  {id:'pol',lbl:'% polare',sub:'',        unit:'%', color:'amber',fmt:E=>Math.round(E.pol)},
  {id:'dep',lbl:'Profondità',sub:'',      unit:'m', color:'amber',fmt:E=>E.dep==null?'—':E.dep.toFixed(1)},
  {id:'tmp',lbl:'Temp. acqua',sub:'',     unit:'°C',color:'',     fmt:E=>E.tmp==null?'—':E.tmp.toFixed(1)},
  {id:'xte',lbl:'XTE',  sub:'scarto rotta',unit:'m',color:'dyn',  fmt:E=>Math.round(E.xte)},
  {id:'brg',lbl:'Rotta WP',sub:'verso waypoint', unit:'°', color:'', fmt:E=>pad3(E.brg)},
  {id:'dtw',lbl:'Dist. WP',sub:'',        unit:'NM',color:'amber',fmt:E=>E.dtw.toFixed(2)},
  {id:'awa',lbl:'Angolo app.',sub:'AWA', unit:'\u00b0', color:'', fmt:E=>Math.round(Math.abs(E.awa)),
    tag:E=>E.awa<0?{t:'\u25c4 Sx',c:'p'}:{t:'Dx \u25ba',c:'s'}},
  {id:'aws',lbl:'Vento app.',sub:'AWS',  unit:'kt',color:'amber',fmt:E=>E.aws.toFixed(1)},
  {id:'ttg',lbl:'Tempo a WP',sub:'TTG',  unit:'',  color:'teal', fmt:E=>fmtHM(E.ttg)},
  {id:'eta',lbl:'Arrivo WP',sub:'ETA',   unit:'',  color:'teal', fmt:E=>{var t=E.ttg;if(t==null)return '\u2014';return fmtClk(new Date(Date.now()+t*3600000));}},
  {id:'heel',lbl:'Sbandamento',sub:'',   unit:'\u00b0', color:'', fmt:E=>HEEL.ready?Math.round(Math.abs(HEEL.val)):'\u2014',
    tag:E=>!HEEL.ready?null:(HEEL.val<0?{t:'\u25c4 Sx',c:'p'}:{t:'Dx \u25ba',c:'s'})},
  {id:'clk',lbl:'Data e ora',sub:'',     unit:'',  color:'', fmt:E=>{var d=new Date();return ('0'+d.getDate()).slice(-2)+'/'+('0'+(d.getMonth()+1)).slice(-2)+' '+fmtClk(d);}},
  {id:'pos',lbl:'Coordinate',sub:'lat / lon',unit:'',color:'',fmt:E=>{var p=cruPos();return p?fmtDM(p.lat,['N','S'])+' '+fmtDM(p.lon,['E','W']):'\u2014';}},
  {id:'sun',lbl:'Alba / Tramonto',sub:'', unit:'', color:'amber',fmt:E=>{var p=cruPos()||{lat:45.65,lon:13.77};var st=sunTimes(new Date(),p.lat,p.lon);return (st.rise?fmtClk(st.rise):'\u2014')+'/'+(st.set?fmtClk(st.set):'\u2014');}},
];
const M_BY={}; METRICS.forEach(m=>M_BY[m.id]=m);

/* ── config (persistita) ── */
const DEF={2:['sog','twa'],
           3:['sog','tws'],
           4:['sog','cog','tws','twa'],
           5:['sog','stw','tws','twa'],
           8:['sog','cog','hdg','stw','tws','twd','dep','xte']};
let N=4;
let ASSIGN={2:DEF[2].slice(),3:DEF[3].slice(),4:DEF[4].slice(),5:DEF[5].slice(),8:DEF[8].slice()};
let COMPASS_MODE='north'; // north | heading | wp
const COMPASS_LAYOUTS=[3,5];           // layout con bussola grande + campi configurabili
const tileCount=n=>n===5?4:n===3?2:n;  // quanti campi configurabili per ogni layout
function load(){
  try{const c=JSON.parse(localStorage.getItem('raffyca-dash')||'{}');
    if(c.n)N=c.n;
    if(c.assign){[2,3,4,5,8].forEach(k=>{const need=tileCount(k);if(Array.isArray(c.assign[k])&&c.assign[k].length===need)ASSIGN[k]=c.assign[k];});}
    if(c.cmode)COMPASS_MODE=c.cmode;
    if(c.wind)WIND=c.wind;
    if(c.mw){MW.tws=c.mw.tws;MW.twd=c.mw.twd;}
  }catch(e){}
}
function save(){localStorage.setItem('raffyca-dash',JSON.stringify({n:N,assign:ASSIGN,wind:WIND,mw:MW,cmode:COMPASS_MODE}));}

/* ── polare condivisa (raffyca-polar): % polare reale ── */
const POL_DEMO={twa:[0,52,60,75,90,110,120,135,150,180],
  tws:[6,8,10,12,14,16,20],
  data:[[0,0,0,0,0,0,0],
        [5.4,6.2,6.6,6.8,6.9,6.95,7.0],
        [5.6,6.4,6.8,7.0,7.1,7.2,7.3],
        [5.9,6.6,7.0,7.3,7.5,7.65,7.8],
        [5.8,6.6,7.0,7.4,7.75,8.0,8.4],
        [5.6,6.6,7.2,7.7,8.05,8.35,8.9],
        [5.4,6.5,7.1,7.6,8.15,8.7,9.5],
        [4.9,6.0,6.7,7.2,7.75,8.3,9.9],
        [4.1,5.2,6.1,6.75,7.2,7.7,8.8],
        [0,0,0,0,0,0,0]]};
let POL=POL_DEMO, POL_META=null;
function loadPolar(){
  try{const s=JSON.parse(localStorage.getItem('raffyca-polar')||'null');
    if(s&&Array.isArray(s.twa)&&Array.isArray(s.tws)&&Array.isArray(s.data)&&s.twa.length&&s.tws.length&&s.data.length){
      POL=s; POL_META=s.meta||null; updateProfileSub(); return;}
  }catch(e){}
  POL=POL_DEMO; POL_META=null; updateProfileSub();
}
function profileSub(){
  var b=(POL_META&&POL_META.boat)?POL_META.boat:'polare demo';
  var tail=(SRC==='signalk')?'i50/i60':((POL_META&&POL_META.source)?POL_META.source:'stima');
  return b+' \u00b7 '+tail;
}
function updateProfileSub(){var el=document.getElementById('profile');if(el)el.textContent=profileSub();}
function polSpan(arr,x){if(x<=arr[0])return[0,0];if(x>=arr[arr.length-1])return[arr.length-2,1];
  for(let i=0;i<arr.length-1;i++)if(x<=arr[i+1])return[i,(x-arr[i])/(arr[i+1]-arr[i])];return[arr.length-2,1];}
function polarTarget(twa,tws){
  const A=POL.twa,W=POL.tws,D=POL.data;
  let a=Math.abs(twa)%360; if(a>180)a=360-a;
  const ai=polSpan(A,a),wi=polSpan(W,Math.max(0,tws));
  const a0=ai[0],af=ai[1],w0=wi[0],wf=wi[1];
  const cell=(i,j)=>{const r=D[i]||[];const v=+r[j];return isFinite(v)?v:0;};
  const top=cell(a0,w0)+(cell(a0,w0+1)-cell(a0,w0))*wf;
  const bot=cell(a0+1,w0)+(cell(a0+1,w0+1)-cell(a0+1,w0))*wf;
  return top+(bot-top)*af;
}

/* ── stato effettivo secondo sorgenti ── */
function eff(){
  const E={sog:S.sog,cog:S.cog,brg:S.brg,dtw:S.dtw,xte:S.xte};
  E.hdg = SRC==='estimate'? S.cog : S.hdg;
  E.stw = SRC==='estimate'? S.sog : S.stw;
  E.dep = SRC==='estimate'? null  : S.dep;
  E.tmp = SRC==='estimate'? null  : S.tmp;
  if(WIND==='manual'){E.tws=MW.tws;E.twd=MW.twd;}
  else {E.tws=S.tws;E.twd=S.twd;}
  let d=((E.twd-E.cog+540)%360)-180;   // -180..180, >0 = dritta (S), <0 = sinistra (P)
  E.twa=d;
  E.vmg=Math.abs(E.stw*Math.cos(d*Math.PI/180));
  const tgt=polarTarget(E.twa,E.tws);
  E.pol = tgt>0.3 ? Math.max(0,Math.min(120, 100*E.stw/tgt)) : 0;
  var twaR=E.twa*Math.PI/180;
  E.aws=Math.sqrt(E.tws*E.tws+E.stw*E.stw+2*E.tws*E.stw*Math.cos(twaR));
  E.awa=(E.aws>0.05)?Math.atan2(E.tws*Math.sin(twaR),E.tws*Math.cos(twaR)+E.stw)*180/Math.PI:0;
  E.ttg=(E.sog>0.2&&E.dtw!=null&&isFinite(E.dtw))?E.dtw/E.sog:null;
  return E;
}
function chip(id){
  if(id==='dep'||id==='tmp') return SRC==='estimate'?{t:'n/d',c:'na'}:null;
  if(id==='hdg'||id==='stw') return SRC==='estimate'?{t:'stima',c:''}:null;
  if(['tws','twd','twa','vmg','pol'].includes(id))
    return WIND==='estimate'?{t:'stima',c:''}:WIND==='manual'?{t:'man',c:'man'}:null;
  return null;
}

/* ── bussola (layout 5) ── */
function cpol(cx,cy,r,deg){var t=deg*Math.PI/180;return [cx+r*Math.sin(t), cy-r*Math.cos(t)];}
function compassSVG(hdg,brg,mode){
  var cx=100,cy=100;
  hdg=((hdg%360)+360)%360;
  var hasWP=(brg!=null&&isFinite(brg)); if(hasWP)brg=((brg%360)+360)%360;
  var rot = mode==='heading'? -hdg : (mode==='wp'? -(hasWP?brg:hdg) : 0);
  var s='';
  s+='<circle cx="100" cy="100" r="96" fill="#08131f" stroke="#1a3550" stroke-width="1.5"/>';
  for(var a=0;a<360;a+=10){var mj=(a%30===0);var p1=cpol(cx,cy,94,a+rot),p2=cpol(cx,cy,mj?83:88,a+rot);
    s+='<line x1="'+p1[0].toFixed(1)+'" y1="'+p1[1].toFixed(1)+'" x2="'+p2[0].toFixed(1)+'" y2="'+p2[1].toFixed(1)+'" stroke="#2a4a68" stroke-width="'+(mj?1.6:0.8)+'"/>';}
  [[0,'N','#cfe3f2'],[90,'E','#6f93b2'],[180,'S','#6f93b2'],[270,'O','#6f93b2']].forEach(function(c){
    var p=cpol(cx,cy,72,c[0]+rot);
    s+='<text x="'+p[0].toFixed(1)+'" y="'+(p[1]+4.5).toFixed(1)+'" text-anchor="middle" font-size="13" font-weight="700" fill="'+c[2]+'" font-family="ui-monospace,monospace">'+c[1]+'</text>';});
  function arrow(deg,color,op){var ap=cpol(cx,cy,90,deg);var t=deg*Math.PI/180,w=8;
    var b1=[cx+w*Math.cos(t),cy+w*Math.sin(t)],b2=[cx-w*Math.cos(t),cy-w*Math.sin(t)];
    return '<polygon points="'+ap[0].toFixed(1)+','+ap[1].toFixed(1)+' '+b1[0].toFixed(1)+','+b1[1].toFixed(1)+' '+b2[0].toFixed(1)+','+b2[1].toFixed(1)+'" fill="'+color+'" opacity="'+op+'"/>';}
  s+=arrow(hdg+rot,'#2BD9C4',0.9);
  if(hasWP)s+=arrow(brg+rot,'#FFC24B',0.8);
  s+='<circle cx="100" cy="100" r="46" fill="#08131f"/><circle cx="100" cy="100" r="46" fill="none" stroke="#1a3550" stroke-width="1"/>';
  s+='<text x="100" y="95" text-anchor="middle" font-size="27" font-weight="700" fill="#cfe3f2" font-family="ui-monospace,monospace" letter-spacing="-1">'+pad3(Math.round(hdg))+'</text>';
  s+='<text x="100" y="110" text-anchor="middle" font-size="8.5" fill="#6f93b2" font-family="ui-monospace,monospace" letter-spacing="1.5">PRUA</text>';
  if(hasWP)s+='<text x="100" y="127" text-anchor="middle" font-size="10.5" font-weight="700" fill="#FFC24B" font-family="ui-monospace,monospace">WP '+pad3(Math.round(brg))+'\u00b0</text>';
  var ml=mode==='heading'?'PRUA su':mode==='wp'?'WP su':'NORD su';
  s+='<text x="100" y="17" text-anchor="middle" font-size="8.5" fill="#6f93b2" font-family="ui-monospace,monospace" letter-spacing="1.5">'+ml+'</text>';
  return '<svg viewBox="0 0 200 200" style="width:100%;height:100%;max-height:100%;display:block">'+s+'</svg>';
}
function paintCompass(slot,E){
  var w=slot.querySelector('.cwrap'); if(!w)return;
  w.innerHTML=compassSVG(E.hdg, (E.brg!=null&&isFinite(E.brg))?E.brg:null, COMPASS_MODE);
}
function cycleCompassMode(){
  COMPASS_MODE = COMPASS_MODE==='north'?'heading':COMPASS_MODE==='heading'?'wp':'north';
  save(); paint();
}

/* ── costruzione griglia ── */
function build(){
  const g=$('grid'); g.className='grid n'+N; g.innerHTML='';
  if(COMPASS_LAYOUTS.includes(N)){
    const cs=document.createElement('div');
    cs.className='instr slot compass'; cs.dataset.compass='1';
    cs.innerHTML='<div class="viti"><i></i><i></i><i></i><i></i></div><div class="cwrap"></div>';
    cs.addEventListener('click',cycleCompassMode);
    g.appendChild(cs);
  }
  const nm=tileCount(N);
  for(let i=0;i<nm;i++){
    const slot=document.createElement('div');
    slot.className='instr slot';
    slot._shape='';
    slot.dataset.idx=i;
    slot.innerHTML='<div class="viti"><i></i><i></i><i></i><i></i></div>'+
      '<div class="dp"><div class="lbl"></div>'+
      '<div class="numrow"><span class="num"></span><span class="unit"></span></div></div>';
    longPress(slot,i);
    g.appendChild(slot);
  }
  paint();
  requestAnimationFrame(fitAll);
}
function fit(slot){
  if(slot.dataset.compass)return;
  const dp=slot.querySelector('.dp'), lbl=slot.querySelector('.lbl');
  const num=slot.querySelector('.num'), unit=slot.querySelector('.unit');
  const tag=slot.querySelector('.side-tag');
  const availH=Math.max(24, dp.clientHeight - lbl.offsetHeight - 22);
  const availW=Math.max(24, dp.clientWidth - 26);
  let chars=Math.max(1,(num.textContent||'').length);
  if(unit&&unit.textContent) chars+=unit.textContent.length*0.5+0.4;
  if(tag) chars+=2;
  let fs=Math.min(availH*0.98, availW/(chars*0.60));
  fs=Math.max(14,Math.min(fs,220));
  num.style.fontSize=fs+'px';
  unit.style.fontSize=Math.max(11,fs*0.26)+'px';
}
function fitAll(){$('grid').querySelectorAll('.slot').forEach(fit);}
addEventListener('resize',fitAll);
function paint(){
  const E=eff();
  $('grid').querySelectorAll('.slot').forEach(slot=>{
    if(slot.dataset.compass){paintCompass(slot,E);return;}
    const i=+slot.dataset.idx, m=M_BY[ASSIGN[N][i]]||METRICS[0];
    const ch=chip(m.id);
    slot.querySelector('.lbl').innerHTML=
      m.lbl+(m.sub?' <span class="sub2">'+m.sub+'</span>':'')+
      (ch?' <span class="est '+ch.c+'">'+ch.t+'</span>':'');
    const num=slot.querySelector('.num');
    num.textContent=m.fmt(E);
    const col=m.color==='dyn'?(E.xte<15?'teal':E.xte<40?'amber':'coral'):m.color;
    num.className='num'+(col?' '+col:'');
    slot.querySelector('.unit').textContent=m.unit;
    const old=slot.querySelector('.side-tag'); if(old)old.remove();
    if(m.tag){const tg=m.tag(E); if(tg){const sp=document.createElement('span');
      sp.className='side-tag '+tg.c;sp.textContent=tg.t;slot.querySelector('.numrow').appendChild(sp);}}
    const shape=(num.textContent||'').length+'|'+(m.tag?1:0)+'|'+m.unit;
    if(slot._shape!==shape){slot._shape=shape;fit(slot);}
  });
}

/* ── long-press → scelta grandezza ── */
let ACTIVE=0;
function longPress(el,i){
  let t=null,sx=0,sy=0;
  const start=e=>{const p=e;sx=p.clientX;sy=p.clientY;el.classList.add('press');
    t=setTimeout(()=>{t=null;el.classList.remove('press');openPick(i);
      if(navigator.vibrate)navigator.vibrate(15);},480);};
  const move=e=>{if(t&&(Math.abs(e.clientX-sx)>10||Math.abs(e.clientY-sy)>10))cancel();};
  const cancel=()=>{el.classList.remove('press');if(t){clearTimeout(t);t=null;}};
  el.addEventListener('pointerdown',start);
  el.addEventListener('pointermove',move);
  el.addEventListener('pointerup',cancel);
  el.addEventListener('pointerleave',cancel);
  el.addEventListener('pointercancel',cancel);
  el.addEventListener('contextmenu',e=>e.preventDefault());
}
function openPick(i){
  ACTIVE=i;
  const cur=ASSIGN[N][i], mg=$('mgrid'); mg.innerHTML='';
  METRICS.forEach(m=>{
    const b=document.createElement('button');
    b.className='mbtn'+(m.id===cur?' on':'');
    b.innerHTML='<div class="mb-lbl">'+m.lbl+'</div><div class="mb-sub">'+
      (m.sub?m.sub+' · ':'')+m.unit+'</div>';
    b.addEventListener('click',()=>{ASSIGN[N][i]=m.id;save();build();closeSheets();});
    mg.appendChild(b);
  });
  $('pick').classList.add('on');
}

/* ── sorgente generale (i due metodi) ── */
$('src').addEventListener('click',()=>{
  SRC=SRC==='estimate'?'signalk':'estimate';
  const real=SRC==='signalk';
  $('src').classList.toggle('real',real);
  $('srcTx').textContent=real?'Signal K':'Stima';
  $('srcSub').textContent=real?'WebSocket NMEA':'GPS + meteo';
  $('profile').textContent=profileSub();
  paint();
});

/* ── sorgente vento (3 stati, include manuale) ── */
const WLBL={estimate:'Stima',signalk:'Signal K',manual:'Manuale'};
function setWind(w){
  WIND=w; $('windSrc').dataset.w=w; $('windTx').textContent=WLBL[w]; save();
  if(w==='manual'){$('mwTws').value=MW.tws;$('mwTwd').value=MW.twd;$('wsheet').classList.add('on');}
  paint();
}
$('windSrc').addEventListener('click',()=>{
  setWind(WIND==='estimate'?'signalk':WIND==='signalk'?'manual':'estimate');
});

/* editor manuale */
document.querySelectorAll('#wsheet .stepper button').forEach(b=>{
  b.addEventListener('click',()=>{
    const k=b.dataset.k, d=parseFloat(b.dataset.d);
    if(k==='tws')MW.tws=Math.max(0,Math.min(60,+(MW.tws+d).toFixed(1)));
    else MW.twd=((MW.twd+d)%360+360)%360;
    $('mwTws').value=MW.tws; $('mwTwd').value=MW.twd; save(); paint();
  });
});
$('mwTws').addEventListener('input',e=>{MW.tws=Math.max(0,Math.min(60,parseFloat(e.target.value)||0));save();paint();});
$('mwTwd').addEventListener('input',e=>{let v=parseFloat(e.target.value)||0;MW.twd=((v%360)+360)%360;save();paint();});

/* ── selettore layout ── */
$('segLayout').querySelectorAll('button').forEach(b=>{
  b.addEventListener('click',()=>{
    N=+b.dataset.n;
    $('segLayout').querySelectorAll('button').forEach(x=>x.classList.toggle('on',x===b));
    save();build();
  });
});

/* ── fogli: chiusura ── */
function closeSheets(){document.querySelectorAll('.sheet').forEach(s=>s.classList.remove('on'));}
document.querySelectorAll('[data-close]').forEach(el=>el.addEventListener('click',closeSheets));

/* ── toast ── */
let tt; function toast(m){const e=$('toast');e.textContent=m;e.classList.add('on');
  clearTimeout(tt);tt=setTimeout(()=>e.classList.remove('on'),2600);}

/* ══════ REGISTRAZIONE (archivio condiviso con l'hub) ══════ */
const lsGet=k=>{try{return JSON.parse(localStorage.getItem(k)||'[]');}catch(e){return[];}};
const lsSet=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const settings=()=>{try{return JSON.parse(localStorage.getItem('raffyca-settings')||'{}');}catch(e){return{};}};
const hav=(a,b)=>{const R=6371000,r=Math.PI/180;const dLa=(b[0]-a[0])*r,dLo=(b[1]-a[1])*r;
  const s=Math.sin(dLa/2)**2+Math.cos(a[0]*r)*Math.cos(b[0]*r)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));};

function refreshActiveWp(){
  const id=localStorage.getItem('raffyca-active-wp')||'';
  const w=lsGet('raffyca-waypoints').find(x=>x.id===id);
  /* WP attivo ora mostrato nella barra fissa in alto */
}

/* segna waypoint alla posizione corrente */
$('btnWpt').addEventListener('click',()=>{
  const def='WP '+new Date().toLocaleTimeString('it',{hour:'2-digit',minute:'2-digit'});
  const name=prompt('Nome waypoint:',def); if(!name)return;
  const w=lsGet('raffyca-waypoints');
  w.push({id:'w'+Date.now(),name:name.trim(),lat:S.lat,lon:S.lon,ts:Date.now()});
  lsSet('raffyca-waypoints',w);
  if(navigator.vibrate)navigator.vibrate(15);
  toast('Waypoint \u201C'+name.trim()+'\u201D salvato');
});

/* registra traccia GPX (campionamento da Impostazioni) */
let recOn=false,recPts=[],recTimer=null,recTick=null,recStart=0;
function sample(){recPts.push([S.lat,S.lon,Date.now()]);try{localStorage.setItem("raffyca-rec",JSON.stringify({on:true,pts:recPts.length,since:recStart}));}catch(e){}updateTrkBtn();}
function updateTrkBtn(){if(!recOn)return;
  const el=Math.round((Date.now()-recStart)/1000);
  $('trkTx').textContent='Stop '+Math.floor(el/60)+':'+String(el%60).padStart(2,'0')+' · '+recPts.length;}
$('btnTrk').addEventListener('click',()=>{
  if(!recOn){
    const iv=Math.max(1,+(settings().trackInterval)||5);  // secondi, default 5
    recOn=true;recPts=[];recStart=Date.now();sample();
    recTimer=setInterval(sample,iv*1000);recTick=setInterval(updateTrkBtn,1000);
    $('btnTrk').classList.add('rec');updateTrkBtn();
    toast('Registrazione · 1 punto/'+iv+'s');
  }else{
    recOn=false;clearInterval(recTimer);clearInterval(recTick);try{localStorage.removeItem("raffyca-rec");}catch(e){}
    $('btnTrk').classList.remove('rec');$('trkTx').textContent='Traccia';
    if(recPts.length<2){toast('Traccia troppo corta, scartata');return;}
    let dist=0;for(let i=1;i<recPts.length;i++)dist+=hav(recPts[i-1],recPts[i]);
    const dur=recPts[recPts.length-1][2]-recPts[0][2];
    const d=new Date();
    const def='Traccia '+d.toLocaleDateString('it',{day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('it',{hour:'2-digit',minute:'2-digit'});
    const name=(prompt('Nome traccia:',def)||def).trim();
    const t=lsGet('raffyca-tracks');
    t.push({id:'t'+Date.now(),name:name,ts:Date.now(),dist:dist,dur:dur,pts:recPts});
    lsSet('raffyca-tracks',t);
    toast('Traccia salvata · '+recPts.length+' punti');
  }
});
document.addEventListener('visibilitychange',()=>{if(!document.hidden){loadPolar();refreshActiveWp();}});
window.addEventListener('storage',e=>{if(e.key==='raffyca-polar'){loadPolar();paint();}});

/* ── simulatore ── */
function drift(){
  const n=(x,d,lo,hi)=>Math.max(lo,Math.min(hi,x+(Math.random()-.5)*d));
  S.tws=n(S.tws,.7,5,27); S.twd=(S.twd+(Math.random()-.5)*6+360)%360;
  S.sog=n(S.sog,.2,3,8.5); S.stw=S.sog+n(0,.3,-.4,.4);
  S.cog=n(S.cog,3,30,270); S.hdg=S.cog+n(0,.3,-6,6);
  S.dep=n(S.dep,1,5,40); S.tmp=n(S.tmp,.08,14,19);
  S.xte=n(S.xte,10,0,80); if(Math.random()<.1)S.xside*=-1;
  S.brg=n(S.brg,4,80,110); S.dtw=n(S.dtw,.04,.05,1.2);
  S.lat+=(Math.random()-.5)*0.0004; S.lon+=(Math.random()-.5)*0.0006;
  paint();
}

/* ── avvio ── */
load();
loadPolar();
$('segLayout').querySelectorAll('button').forEach(x=>x.classList.toggle('on',+x.dataset.n===N));
$('windSrc').dataset.w=WIND; $('windTx').textContent=WLBL[WIND];
build();
refreshActiveWp();
setTimeout(()=>toast('Tieni premuto un campo per cambiare grandezza'),700);
if(!reduce)setInterval(drift,1200);
</script>
