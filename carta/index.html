<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Carta Nautica · ProVela</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
:root{--bg:#060e18;--panel:#0e2036;--panel2:#0b1a2c;--dp:#040c14;--line:#1a3248;--dim:#122030;
  --ink:#deedf5;--sub:#5a7a94;--teal:#2BD9C4;--amber:#FFC24B;--coral:#FF6B6B;--green:#46d68a;
  --mono:ui-monospace,"SF Mono","Roboto Mono",Menlo,Consolas,monospace;--sans:system-ui,-apple-system,"Segoe UI",sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100dvh;display:flex;flex-direction:column;}
.wrap{padding:10px;display:flex;flex-direction:column;gap:10px;}
.bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
h1{font-size:15px;letter-spacing:.06em;color:var(--teal);text-transform:uppercase;margin-right:auto;}
#map{width:100%;height:46vh;min-height:280px;border-radius:12px;border:1px solid var(--line);background:#0A1628;}
.leaflet-control-layers{background:var(--panel)!important;color:var(--ink)!important;border:1px solid var(--line)!important;}
select,button,input,textarea{font-family:var(--sans);color:var(--ink);}
.sel{font-family:var(--mono);font-size:12px;padding:8px 10px;border-radius:9px;border:1px solid var(--line);background:var(--dp);}
.btn{font-size:13px;padding:9px 12px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.btn:active{transform:scale(.97);}
.btn.go{border-color:var(--teal);color:var(--teal);}
.btn.sm{padding:6px 9px;font-size:12px;}
.tabs{display:flex;gap:8px;}
.tabs button{flex:1;font-family:var(--mono);font-size:13px;padding:10px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);color:var(--sub);cursor:pointer;}
.tabs button.on{border-color:var(--teal);color:var(--teal);background:rgba(43,217,196,.08);}
.list{display:flex;flex-direction:column;gap:8px;}
.item{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:11px 12px;display:flex;align-items:center;gap:10px;}
.item.active{border-color:var(--teal);box-shadow:inset 0 0 0 1px rgba(43,217,196,.4);}
.dot{width:12px;height:12px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 6px rgba(0,0,0,.5);}
.it-main{flex:1;min-width:0;}
.it-name{font-family:var(--mono);font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.it-sub{font-size:11.5px;color:var(--sub);font-family:var(--mono);margin-top:2px;}
.it-note{font-size:11.5px;color:#8ea8bd;margin-top:3px;font-style:italic;}
.it-acts{display:flex;gap:6px;flex:0 0 auto;}
.chk{width:18px;height:18px;accent-color:var(--teal);flex:0 0 auto;}
.iconbtn{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);color:var(--sub);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.iconbtn.on{border-color:var(--teal);color:var(--teal);}
.iconbtn.del{color:var(--coral);border-color:rgba(255,107,107,.3);}
.empty{color:var(--sub);font-size:13px;text-align:center;padding:18px;}
.ov{position:fixed;inset:0;background:rgba(4,10,18,.72);display:none;align-items:flex-end;justify-content:center;z-index:9500;}
.ov.on{display:flex;}
.sheet{background:var(--panel);border:1px solid var(--line);border-radius:16px 16px 0 0;width:100%;max-width:560px;padding:16px;display:flex;flex-direction:column;gap:12px;max-height:88vh;overflow-y:auto;}
.sheet h3{font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--teal);}
.field label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--sub);display:block;margin-bottom:5px;}
.field input,.field textarea{width:100%;font-size:14px;padding:10px 12px;border-radius:9px;border:1px solid var(--line);background:var(--dp);color:var(--ink);}
.field textarea{resize:vertical;min-height:52px;font-family:var(--sans);}
.tags{display:flex;gap:8px;flex-wrap:wrap;}
.tagchip{width:30px;height:30px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.tagchip.sel{border-color:#fff;transform:scale(1.1);}
.row{display:flex;gap:9px;}
.row .btn{flex:1;justify-content:center;}
.hint{font-size:11px;color:var(--sub);}
.tool{font-size:12px;padding:7px 10px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);color:var(--sub);cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.tool.on{border-color:var(--teal);color:var(--teal);background:rgba(43,217,196,.08);}
.readout{font-family:var(--mono);font-size:12px;color:var(--teal);margin-right:auto;}
.readout b{color:var(--amber);}
.grid-lbl{font-family:var(--mono);font-size:10px;color:#7fd9cf;background:rgba(6,14,24,.6);padding:0 3px;border-radius:3px;white-space:nowrap;}
.zone-lbl{font-family:var(--mono);font-size:10px;color:var(--amber);background:rgba(6,14,24,.65);padding:1px 4px;border-radius:4px;white-space:nowrap;border:1px solid rgba(255,194,75,.35);}
.leaflet-container{background:#0A1628;}
</style>
</head>
<body>
<!-- ===== rf-topbar: barra fissa trasversale ProVela (inietta subito dopo <body>) ===== -->
<style>
.rf-topbar{position:fixed;top:0;left:0;right:0;height:40px;z-index:9000;display:flex;align-items:center;gap:10px;
  padding:0 10px;background:linear-gradient(#0c1c2e,#081521);border-bottom:1px solid #1a3248;
  font-family:ui-monospace,"SF Mono","Roboto Mono",Menlo,Consolas,monospace;color:#5a7a94;font-size:11.5px;
  letter-spacing:.02em;-webkit-user-select:none;user-select:none;box-shadow:0 2px 10px -6px rgba(0,0,0,.8);}
.rf-topbar a.rf-home{display:flex;align-items:center;justify-content:center;width:30px;height:30px;flex:none;
  border-radius:8px;background:rgba(43,217,196,.1);border:1px solid rgba(43,217,196,.35);text-decoration:none;}
.rf-topbar a.rf-home:active{transform:scale(.92);}
.rf-topbar .rf-dt{color:#deedf5;white-space:nowrap;}
.rf-topbar .rf-sun{display:none;}
.rf-topbar .rf-sun b{color:#FFC24B;font-weight:600;}
.rf-topbar .rf-pol{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:46%;color:#5a7a94;}
.rf-topbar .rf-pol b{color:#2BD9C4;font-weight:600;}
.rf-topbar .rf-pol .mod{color:#cfe2ee;}
.rf-topbar .rf-pol .pol{color:#FFC24B;font-weight:600;}
.rf-topbar .rf-pol .pol.warn{color:#FF6B6B;}
.rf-topbar .rf-spacer{flex:1;}
.rf-topbar .rf-status{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:44%;}
.rf-topbar .rf-status.wp b{color:#2BD9C4;font-weight:600;}
.rf-topbar .rf-status.rec{color:#FF6B6B;font-weight:600;}
.rf-topbar .rf-status .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#FF6B6B;
  margin-right:5px;vertical-align:middle;animation:rfblink 1s steps(2,start) infinite;}
@keyframes rfblink{50%{opacity:.25}}
body{padding-top:40px!important;}
@media (max-width:360px){.rf-topbar .rf-sun{display:none;}}
@media (max-width:480px){.rf-topbar .rf-pol .mod{display:none;}}
</style>
<div class="rf-topbar" role="banner">
  <a class="rf-home" href="../" aria-label="Torna al menu ProVela" title="Menu ProVela">
    <svg viewBox="0 0 64 64" width="19" height="19" aria-hidden="true"><path d="M32 8 L32 56 L10 56 Z" fill="#2BD9C4" opacity=".95"/><path d="M32 26 L54 56 L32 56 Z" fill="#2BD9C4" opacity=".45"/><line x1="32" y1="6" x2="32" y2="58" stroke="#1a4a42" stroke-width="3"/></svg>
  </a>
  <span class="rf-dt" id="rfDt">—</span>
  <span class="rf-sun" id="rfSun"></span>
  <span class="rf-pol" id="rfPol" title=""></span>
  <span class="rf-spacer"></span>
  <span class="rf-status" id="rfStatus"></span>
</div>
<script>
(function(){
  var D=["dom","lun","mar","mer","gio","ven","sab"], MO=["gen","feb","mar","apr","mag","giu","lug","ago","set","ott","nov","dic"];
  var DEFAULT=[45.65,13.77]; // Golfo di Trieste — default Alto Adriatico
  function coords(){try{var p=JSON.parse(localStorage.getItem("raffyca-pos")||"null");if(p&&isFinite(p.lat)&&isFinite(p.lon))return[p.lat,p.lon];}catch(e){}return DEFAULT;}
  // alba/tramonto — equazione del sole (nessuna rete, ~1 min di precisione)
  function sunTimes(date,lat,lon){
    var rad=Math.PI/180, deg=180/Math.PI, J2000=2451545;
    var dayMs=Date.UTC(date.getFullYear(),date.getMonth(),date.getDate());
    var n=Math.round(dayMs/86400000 - 0.5 + 2440588 - J2000 + 0.0008);
    var Jstar=n - lon/360;
    var M=(357.5291 + 0.98560028*Jstar)%360;
    var C=1.9148*Math.sin(M*rad)+0.02*Math.sin(2*M*rad)+0.0003*Math.sin(3*M*rad);
    var lam=(M+C+180+102.9372)%360;
    var Jtr=J2000 + Jstar + 0.0053*Math.sin(M*rad) - 0.0069*Math.sin(2*lam*rad);
    var dec=Math.asin(Math.sin(lam*rad)*Math.sin(23.44*rad));
    var co=(Math.sin(-0.833*rad)-Math.sin(lat*rad)*Math.sin(dec))/(Math.cos(lat*rad)*Math.cos(dec));
    if(co>1)return{rise:null,set:null}; if(co<-1)return{rise:null,set:null};
    var w=Math.acos(co)*deg;
    var toDate=function(J){return new Date((J-2440588+0.5)*86400000);};
    return{rise:toDate(Jtr-w/360),set:toDate(Jtr+w/360)};
  }
  function hhmm(d){return d?d.toLocaleTimeString("it",{hour:"2-digit",minute:"2-digit"}):"—";}
  var elDt=document.getElementById("rfDt"), elSun=document.getElementById("rfSun"), elSt=document.getElementById("rfStatus");
  var elPol=document.getElementById("rfPol");
  function esc(x){return String(x).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function polarLabel(){
    var p=null;try{p=JSON.parse(localStorage.getItem("raffyca-polar")||"null");}catch(e){}
    if(!p||!p.twa||!p.data||!p.twa.length)return{txt:"integrata",cls:"warn"};
    var m=p.meta||{};
    if(m.source==="generica"||m.generic)return{txt:(m.boat||"generica"),cls:"warn"};
    if(m.boat)return{txt:m.boat,cls:""};
    if(m.source==="csv")return{txt:"CSV",cls:""};
    return{txt:(m.source||"attiva"),cls:""};
  }
  function tickPolar(){
    if(!elPol)return;
    var pr=null;try{pr=JSON.parse(localStorage.getItem("raffyca-profile")||"null");}catch(e){}
    var boat=(pr&&pr.boat)||"",model=(pr&&pr.model)||"";
    var L=polarLabel();
    var h="";
    if(boat)h+='<b>'+esc(boat)+'</b>';
    if(model)h+=(h?" · ":"")+'<span class="mod">'+esc(model)+'</span>';
    h+=(h?" · ":"")+'<span class="pol '+L.cls+'">pol '+esc(L.txt)+'</span>';
    elPol.innerHTML=h;
    elPol.title=[boat,model,"polare: "+L.txt].filter(Boolean).join(" · ");
  }
  var sunDay="";
  function tickClock(){
    var now=new Date();
    elDt.textContent=D[now.getDay()]+" "+now.getDate()+" "+MO[now.getMonth()]+" · "+now.toLocaleTimeString("it",{hour:"2-digit",minute:"2-digit"});
    var key=now.toDateString();
    if(key!==sunDay){sunDay=key;var c=coords();var s=sunTimes(now,c[0],c[1]);elSun.innerHTML="&#9728; <b>"+hhmm(s.rise)+"</b> &nbsp;&#9790; <b>"+hhmm(s.set)+"</b>";}
  }
  function tickStatus(){
    var rec=null,id="";
    try{rec=JSON.parse(localStorage.getItem("raffyca-rec")||"null");}catch(e){}
    if(rec&&rec.on){elSt.className="rf-status rec";elSt.innerHTML='<span class="dot"></span>REC GPX'+(rec.pts?" · "+rec.pts+" pt":"");return;}
    try{id=localStorage.getItem("raffyca-active-wp")||"";}catch(e){}
    if(id){var w=null;try{w=(JSON.parse(localStorage.getItem("raffyca-waypoints")||"[]")).find(function(x){return x.id===id;});}catch(e){}
      if(w){elSt.className="rf-status wp";elSt.innerHTML="&#9873; WP: <b>"+w.name+"</b>";return;}}
    elSt.className="rf-status";elSt.textContent="";
  }
  tickClock();tickStatus();tickPolar();
  setInterval(tickClock,20000);
  setInterval(tickStatus,3000);
  setInterval(tickPolar,5000);
  window.addEventListener("storage",tickStatus);window.addEventListener("storage",tickPolar);
  document.addEventListener("visibilitychange",function(){if(!document.hidden){tickClock();tickStatus();tickPolar();}});
})();
</script>

  <div class="sheet">
    <h3 id="ovTitle">Nuovo waypoint</h3>
    <div class="field" id="ovCoordField">
      <label>Coordinate — decimali (45.65) oppure gradi-primi (45 39.0 N)</label>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* contratto: raffyca-waypoints [{id,name,lat,lon,ts,tag?,note?}] · raffyca-tracks [{...,tag?,note?}]
   raffyca-active-wp · raffyca-active-track · raffyca-tags {color:nome} · raffyca-pos {lat,lon} */
const $=id=>document.getElementById(id);
const TAGS=[["#8aa0b0","Neutro"],["#2BD9C4","Acqua"],["#FFC24B","Ambra"],["#FF6B6B","Corallo"],["#46d68a","Verde"],["#5b8dff","Blu"],["#C77DFF","Viola"]];
function lsGet(k){try{return JSON.parse(localStorage.getItem(k)||'[]');}catch(e){return[];}}
function lsSet(k,v){localStorage.setItem(k,JSON.stringify(v));}
function actWp(){return localStorage.getItem('raffyca-active-wp')||'';}
function actTrk(){return localStorage.getItem('raffyca-active-track')||'';}
const R=6371000,rad=d=>d*Math.PI/180,deg=r=>r*180/Math.PI;
function hav(a,b){var s=Math.sin(rad(b[0]-a[0])/2)**2+Math.cos(rad(a[0]))*Math.cos(rad(b[0]))*Math.sin(rad(b[1]-a[1])/2)**2;return 2*R*Math.asin(Math.sqrt(s));}
function brng(a,b){var y=Math.sin(rad(b[1]-a[1]))*Math.cos(rad(b[0])),x=Math.cos(rad(a[0]))*Math.sin(rad(b[0]))-Math.sin(rad(a[0]))*Math.cos(rad(b[0]))*Math.cos(rad(b[1]-a[1]));return(deg(Math.atan2(y,x))+360)%360;}
function tagColor(t){return t||"#8aa0b0";}
/* tag nominabili */
function tagsMap(){var d={};TAGS.forEach(t=>d[t[0]]=t[1]);try{Object.assign(d,JSON.parse(localStorage.getItem('raffyca-tags')||'{}'));}catch(e){}return d;}
function tagName(c){return tagsMap()[c]||c;}
function setTagName(c,n){var m={};try{m=JSON.parse(localStorage.getItem('raffyca-tags')||'{}');}catch(e){}if(n&&n.trim())m[c]=n.trim();localStorage.setItem('raffyca-tags',JSON.stringify(m));}
/* parser coordinate: decimali, gradi-primi, gradi-primi-secondi, con emisfero N/S/E/W */
function parseCoord(s){s=String(s||'').trim();if(!s)return NaN;
  var neg=/[SWsw]/.test(s)||/^\s*-/.test(s);
  s=s.replace(/[°'"′″]/g,' ').replace(/[NSEWnsew]/g,' ').replace(',','.').trim();
  var p=s.split(/\s+/).map(parseFloat).filter(x=>!isNaN(x));if(!p.length)return NaN;
  var v=Math.abs(p[0])+(p[1]||0)/60+(p[2]||0)/3600;return neg?-v:v;}

/* posizione */
var POS=null;
(function(){try{var p=JSON.parse(localStorage.getItem('raffyca-pos')||'null');if(p&&isFinite(p.lat))POS=[p.lat,p.lon];}catch(e){}})();
function updatePosInfo(){$('posInfo').textContent=POS?('posizione: '+POS[0].toFixed(4)+', '+POS[1].toFixed(4)):'posizione: — (Alt-click o pressione lunga sulla carta per un WP)';}
if(navigator.geolocation)navigator.geolocation.getCurrentPosition(function(p){POS=[p.coords.latitude,p.coords.longitude];try{localStorage.setItem('raffyca-pos',JSON.stringify({lat:POS[0],lon:POS[1]}));}catch(e){}updatePosInfo();drawPosMarker();},function(){},{enableHighAccuracy:true,timeout:15000});

/* inquadratura iniziale per zona (raffyca-profile.zone) — usata solo se non c'e posizione nota */
var ZONE_VIEW={
 "Alto Adriatico":[45.45,13.35,8],"Medio Adriatico":[43.35,14.15,8],"Basso Adriatico":[41.20,17.60,8],
 "Mar Ionio":[39.00,17.10,8],"Basso Tirreno":[39.60,14.55,8],"Alto Tirreno":[42.45,10.85,8],
 "Mar Ligure":[44.05,8.85,9],"Sardegna":[40.30,9.30,8],"Sicilia":[37.75,13.10,8]};
function zoneView(){try{var p=JSON.parse(localStorage.getItem("raffyca-profile")||"{}");var v=ZONE_VIEW[(p.zone||"").trim()];if(v)return v;}catch(e){}return [43.5,10.3,6];}
var ZV=zoneView();
/* mappa: basi selezionabili + overlay simboli nautici OpenSeaMap.
   Base "Nautica (chiara)" = poche strade, acqua chiara: i simboli nautici risaltano, aspetto vicino a una carta. */
var baseNautica=L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:20,subdomains:'abcd',attribution:'© OpenStreetMap · © CARTO'});
var baseMinimal=L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:20,subdomains:'abcd',attribution:'© OpenStreetMap · © CARTO'});
var baseOSM=L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'});
var seamark=L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png',{maxZoom:19,opacity:1,attribution:'© OpenSeaMap'});
var map=L.map('map',{zoomControl:true}).setView(POS||[ZV[0],ZV[1]],POS?12:ZV[2]);
baseNautica.addTo(map);seamark.addTo(map);
L.control.layers({'Nautica (chiara)':baseNautica,'Minimal':baseMinimal,'OpenStreetMap':baseOSM},{'Simboli nautici (OpenSeaMap)':seamark},{collapsed:true}).addTo(map);
var layer=L.layerGroup().addTo(map), posMarker=null;
var LocateCtl=L.Control.extend({options:{position:'topleft'},onAdd:function(){var b=L.DomUtil.create('a','leaflet-bar');b.href='#';b.title='La mia posizione';b.innerHTML='◎';b.style.cssText='width:30px;height:30px;line-height:30px;text-align:center;font-size:17px;background:#0e2036;color:#2BD9C4;text-decoration:none';L.DomEvent.on(b,'click',function(e){L.DomEvent.stop(e);locateMe();});return b;}});
map.addControl(new LocateCtl());
function locateMe(){if(!navigator.geolocation){alert('GPS non disponibile.');return;}navigator.geolocation.getCurrentPosition(function(p){POS=[p.coords.latitude,p.coords.longitude];try{localStorage.setItem('raffyca-pos',JSON.stringify({lat:POS[0],lon:POS[1]}));}catch(e){}map.setView(POS,14);drawPosMarker();updatePosInfo();renderList();},function(){alert('Posizione non disponibile (permesso negato o segnale assente).');},{enableHighAccuracy:true,timeout:15000});}
function drawPosMarker(){if(posMarker)map.removeLayer(posMarker);if(!POS)return;posMarker=L.circleMarker(POS,{radius:6,color:'#fff',weight:2,fillColor:'#2BD9C4',fillOpacity:1}).addTo(map).bindTooltip('La tua posizione');}

/* ===== pane sotto i marker per griglia e zone (non intercetta i tocchi) ===== */
map.createPane('gridPane');map.getPane('gridPane').style.zIndex=350;map.getPane('gridPane').style.pointerEvents='none';
function lbl(cls,txt,anchor){return L.divIcon({className:'',html:'<span class="'+cls+'">'+txt+'</span>',iconSize:[70,14],iconAnchor:anchor||[-4,7]});}

/* ===== Griglia meridiani/paralleli, passo fisso 1° (long. e lat.) ===== */
var gridOn=false, gridLayer=L.layerGroup();
function fmtLat(v){return Math.abs(v)+'° '+(v<0?'S':'N');}
function fmtLon(v){return Math.abs(v)+'° '+(v<0?'W':'E');}
function drawGrid(){gridLayer.clearLayers();if(!gridOn)return;
  var b=map.getBounds(),S=b.getSouth(),N=b.getNorth(),W=b.getWest(),E=b.getEast();
  var s=Math.floor(S),n=Math.ceil(N),w=Math.floor(W),e=Math.ceil(E);
  if(n-s>80||e-w>80)return; // troppo lontano: evita migliaia di linee
  for(var la=s;la<=n;la++){L.polyline([[la,W],[la,E]],{pane:'gridPane',color:'#2BD9C4',weight:.6,opacity:.35,interactive:false}).addTo(gridLayer);
    L.marker([la,W],{pane:'gridPane',icon:lbl('grid-lbl',fmtLat(la),[-4,7]),interactive:false,keyboard:false}).addTo(gridLayer);}
  for(var lo=w;lo<=e;lo++){L.polyline([[S,lo],[N,lo]],{pane:'gridPane',color:'#2BD9C4',weight:.6,opacity:.35,interactive:false}).addTo(gridLayer);}
  // etichette meridiani: inserite ~26px sopra il bordo sud, così non finiscono clippate/coperte (tablet)
  var sPt=map.latLngToContainerPoint(L.latLng(S,w)),lonLat=map.containerPointToLatLng(L.point(sPt.x,sPt.y-26)).lat;
  for(var lo2=w;lo2<=e;lo2++){L.marker([lonLat,lo2],{pane:'gridPane',icon:lbl('grid-lbl',fmtLon(lo2),[18,7]),interactive:false,keyboard:false}).addTo(gridLayer);}}

 "Alto Adriatico":{latN:45.85,latS:44.35,lonW:12.15,lonE:15.95},

 "Mar Ionio":{latN:40.55,latS:36.60,lonW:14.60,lonE:19.60},
 "Basso Tirreno":{latN:41.20,latS:37.70,lonW:11.80,lonE:16.70},
 "Alto Tirreno":{latN:43.20,latS:40.80,lonW:9.00,lonE:11.95},

 "Sicilia":{latN:38.70,latS:36.30,lonW:11.80,lonE:15.80}};
var zonesOn=false, zoneLayer=L.layerGroup();
function drawZones(){zoneLayer.clearLayers();if(!zonesOn)return;
  Object.keys(ZONE_BOX).forEach(function(z){var x=ZONE_BOX[z];
    L.rectangle([[x.latS,x.lonW],[x.latN,x.lonE]],{pane:'gridPane',color:'#FFC24B',weight:2.4,opacity:.95,fill:true,fillColor:'#FFC24B',fillOpacity:.05,dashArray:'9 4',interactive:false}).addTo(zoneLayer);
    L.marker([x.latN,(x.lonW+x.lonE)/2],{pane:'gridPane',icon:lbl('zone-lbl',z),interactive:false,keyboard:false}).addTo(zoneLayer);});}

/* ===== gestione modalità carta: normale | disegno traccia | misura ===== */
var mapMode='normal';
function setMode(m){
  if(mapMode==='draw'&&m!=='draw')endDraw(false);
  if(mapMode==='meas'&&m!=='meas')endMeas();
  mapMode=m;
  $('tDraw').classList.toggle('on',m==='draw');
  $('tMeas').classList.toggle('on',m==='meas');
  $('drawCtl').style.display=m==='draw'?'':'none';
  $('measCtl').style.display=m==='meas'?'':'none';
  if(m==='normal')map.doubleClickZoom.enable();else map.doubleClickZoom.disable();
}

/* --- disegno traccia --- */
var drawPts=[], drawLine=null, drawDots=L.layerGroup().addTo(map);
function refreshDraw(){if(drawLine){map.removeLayer(drawLine);drawLine=null;}drawDots.clearLayers();
  if(drawPts.length){drawLine=L.polyline(drawPts,{color:'#2BD9C4',weight:3,dashArray:'6 4'}).addTo(map);
    drawPts.forEach(function(p){L.circleMarker(p,{radius:3,color:'#fff',weight:1,fillColor:'#2BD9C4',fillOpacity:1}).addTo(drawDots);});}
  var d=0;for(var i=1;i<drawPts.length;i++)d+=hav(drawPts[i-1],drawPts[i]);
  $('drawInfo').textContent=drawPts.length+' punti · '+(d/1852).toFixed(2)+' NM';}
function startDraw(){drawPts=[];refreshDraw();setMode('draw');}
function drawUndo(){drawPts.pop();refreshDraw();}
function endDraw(save){
  if(save){
    if(drawPts.length<2){alert('Servono almeno 2 punti.');return false;}
    var d=0;for(var i=1;i<drawPts.length;i++)d+=hav(drawPts[i-1],drawPts[i]);
    var nm=prompt('Nome traccia:','Traccia '+(lsGet('raffyca-tracks').length+1));
    if(nm!==null){var trks=lsGet('raffyca-tracks');
      trks.push({id:'t'+Date.now(),name:(nm.trim()||'Traccia'),ts:Date.now(),pts:drawPts.map(p=>[p[0],p[1],0]),dist:+(d/1852).toFixed(2),dur:0,tag:'#2BD9C4'});
      lsSet('raffyca-tracks',trks);}
  }
  drawPts=[];if(drawLine){map.removeLayer(drawLine);drawLine=null;}drawDots.clearLayers();render();return true;}

/* --- misura distanza/rotta tra due punti --- */
var measPts=[], measLine=null, measMk=L.layerGroup().addTo(map);
function measReset(){measPts=[];measMk.clearLayers();if(measLine){map.removeLayer(measLine);measLine=null;}}
function startMeas(){measReset();$('measInfo').textContent='Tocca due punti sulla carta.';setMode('meas');}
function measAdd(ll){
  if(measPts.length>=2)measReset();
  measPts.push([ll.lat,ll.lng]);
  L.circleMarker(measPts[measPts.length-1],{radius:5,color:'#fff',weight:2,fillColor:'#FFC24B',fillOpacity:1}).addTo(measMk);
  if(measPts.length===2){measLine=L.polyline(measPts,{color:'#FFC24B',weight:2,dashArray:'6 4'}).addTo(map);
    var d=hav(measPts[0],measPts[1])/1852,b=brng(measPts[0],measPts[1]);
    $('measInfo').innerHTML='Dist <b>'+d.toFixed(2)+' NM</b> · Rotta <b>'+String(Math.round(b)).padStart(3,'0')+'°</b>';}
  else $('measInfo').textContent='Punto A fissato — tocca il punto B.';}
function endMeas(){measReset();$('measInfo').textContent='Tocca due punti sulla carta.';}

/* --- click/tocco sulla carta secondo modalità --- */
function onMapPoint(e){
  if(mapMode==='draw'){drawPts.push([e.latlng.lat,e.latlng.lng]);refreshDraw();return;}
  if(mapMode==='meas'){measAdd(e.latlng);return;}
  if(e.originalEvent&&e.originalEvent.altKey)openCreate(e.latlng.lat,e.latlng.lng); // Alt-click = nuovo WP
}
map.on('click',onMapPoint);
map.on('contextmenu',function(e){if(mapMode!=='normal')return;openCreate(e.latlng.lat,e.latlng.lng);}); // pressione lunga (touch) / tasto destro
map.on('moveend',function(){if(gridOn)drawGrid();});

/* ===== AIS live via AISstream.io (WebSocket, chiave utente in raffyca-ais-key) =====
   La chiave gratuita si ottiene registrandosi su aisstream.io. La copertura dipende
   dai ricevitori della community (buona vicino ai porti). Si sottoscrive il riquadro
   visibile; spostando molto la carta la sottoscrizione si aggiorna. */
var aisOn=false, aisWS=null, aisLayer=L.layerGroup(), aisMk={}, aisSweep=null, aisMoveT=null;
function aisKey(){return localStorage.getItem('raffyca-ais-key')||'';}
function aisStatus(t){var el=$('aisInfo');if(el)el.textContent=t;}
function aisIcon(cog){var c=isFinite(cog)?cog:0;
  return L.divIcon({className:'',iconSize:[20,20],iconAnchor:[10,10],
    html:'<div style="width:20px;height:20px;transform:rotate('+c+'deg)"><svg viewBox="0 0 20 20" width="20" height="20"><path d="M10 1 L15.5 18 L10 14 L4.5 18 Z" fill="#46d68a" stroke="#04121a" stroke-width="1.2"/></svg></div>'});}
function aisBBox(){var b=map.getBounds().pad(0.3);return [[[b.getSouth(),b.getWest()],[b.getNorth(),b.getEast()]]];}
function aisSubscribe(){if(!aisWS||aisWS.readyState!==1)return;
  aisWS.send(JSON.stringify({APIKey:aisKey(),BoundingBoxes:aisBBox(),FilterMessageTypes:["PositionReport","ShipStaticData"]}));}
function aisConnect(){
  if(!aisKey()){aisStatus('AIS: chiave mancante');return;}
  aisStatus('AIS: connessione…');
  try{aisWS=new WebSocket('wss://stream.aisstream.io/v0/stream');}catch(e){aisStatus('AIS: errore connessione');return;}
  aisWS.onopen=function(){aisSubscribe();aisStatus('AIS: in ascolto…');};
  aisWS.onmessage=function(ev){var d;try{d=JSON.parse(ev.data);}catch(e){return;}
    if(d && d.error){aisStatus('AIS: '+d.error);return;}
    var md=d&&d.MetaData;if(!md)return;var mmsi=md.MMSI;if(!mmsi)return;
    var la=md.latitude,lo=md.longitude;if(!isFinite(la)||!isFinite(lo))return;
    var name=String(md.ShipName||'').trim()||('MMSI '+mmsi);
    var cog=NaN,sog=NaN;
    if(d.Message&&d.Message.PositionReport){var pr=d.Message.PositionReport;
      if(isFinite(pr.Cog)&&pr.Cog<360)cog=pr.Cog; if(isFinite(pr.Sog))sog=pr.Sog;
      if(isFinite(pr.TrueHeading)&&pr.TrueHeading<360)cog=pr.TrueHeading;}
    var tip=name+(isFinite(sog)?' · '+sog.toFixed(1)+' kn':'')+(isFinite(cog)?' · '+String(Math.round(cog)).padStart(3,'0')+'°':'');
    var rec=aisMk[mmsi];
    if(rec){rec.m.setLatLng([la,lo]);if(isFinite(cog))rec.m.setIcon(aisIcon(cog));rec.m.setTooltipContent(tip);rec.t=Date.now();}
    else{var m=L.marker([la,lo],{icon:aisIcon(cog)}).addTo(aisLayer).bindTooltip(tip);aisMk[mmsi]={m:m,t:Date.now()};}
    aisStatus('AIS: '+Object.keys(aisMk).length+' navi');};
  aisWS.onclose=function(){if(aisOn)aisStatus('AIS: connessione chiusa (chiave o rete?)');};
  aisWS.onerror=function(){aisStatus('AIS: errore di rete');};
}
function aisSweepStale(){var now=Date.now();Object.keys(aisMk).forEach(function(k){if(now-aisMk[k].t>600000){aisLayer.removeLayer(aisMk[k].m);delete aisMk[k];}});}
function aisStart(){
  if(!aisKey()){var k=prompt('Incolla la tua API key AISstream.io\n(gratuita: registrati su aisstream.io → API Keys):','');
    if(k===null)return false;k=k.trim();if(!k)return false;localStorage.setItem('raffyca-ais-key',k);}
  aisOn=true;aisLayer.addTo(map);aisConnect();aisSweep=setInterval(aisSweepStale,60000);return true;}
function aisStop(){aisOn=false;if(aisWS){try{aisWS.close();}catch(e){}aisWS=null;}
  if(aisSweep){clearInterval(aisSweep);aisSweep=null;}
  Object.keys(aisMk).forEach(function(k){aisLayer.removeLayer(aisMk[k].m);});aisMk={};map.removeLayer(aisLayer);aisStatus('AIS: —');}
map.on('moveend',function(){if(!aisOn)return;clearTimeout(aisMoveT);
  aisMoveT=setTimeout(function(){ if(aisWS&&aisWS.readyState===1)aisSubscribe(); else if(!aisWS||aisWS.readyState>1)aisConnect(); },800);});

/* filtro */
function rebuildFilter(){var f=$('filter'),cur=f.value;
  var tags=[...new Set(lsGet('raffyca-waypoints').concat(lsGet('raffyca-tracks')).map(x=>x.tag).filter(Boolean))];
  f.innerHTML='<option value="all">Tutte</option><option value="active">Solo attivo</option>'+tags.map(t=>'<option value="tag:'+t+'">Tag: '+esc(tagName(t))+'</option>').join('');
  if([...f.options].some(o=>o.value===cur))f.value=cur;}
function passFilter(x,isWp){var f=$('filter').value;if(f==='all')return true;if(f==='active')return isWp?x.id===actWp():x.id===actTrk();if(f.startsWith('tag:'))return x.tag===f.slice(4);return true;}

/* disegno */
function draw(){layer.clearLayers();
  var wpts=lsGet('raffyca-waypoints'),trks=lsGet('raffyca-tracks'),aw=actWp(),at=actTrk();
  trks.forEach(function(t){if(!passFilter(t,false)||!t.pts||t.pts.length<2)return;
    L.polyline(t.pts.map(p=>[p[0],p[1]]),{color:tagColor(t.tag),weight:t.id===at?5:3,opacity:t.id===at?1:.75}).addTo(layer).bindTooltip(t.name);});
  wpts.forEach(function(w){if(!passFilter(w,true))return;
    var m=L.circleMarker([w.lat,w.lon],{radius:w.id===aw?9:7,color:w.id===aw?'#fff':tagColor(w.tag),weight:w.id===aw?3:1.5,fillColor:tagColor(w.tag),fillOpacity:.9}).addTo(layer);
    m.bindTooltip(w.name+(w.note?' · '+w.note:''));m.on('click',function(){if(mapMode!=='normal')return;setActiveWp(w.id===aw?'':w.id);});});
  drawPosMarker();}
function setActiveWp(id){localStorage.setItem('raffyca-active-wp',id||'');render();}
function setActiveTrk(id){localStorage.setItem('raffyca-active-track',id||'');render();}

/* liste */
var tab='wpt', sel={wpt:{},trk:{}};
function fmtDur(s){s=Math.round(s||0);var h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h?h+'h'+m+'m':m+'m';}
function esc(s){return String(s||'').replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}
function renderList(){var host=$('list');host.innerHTML='';
  if(tab==='wpt'){var wpts=lsGet('raffyca-waypoints'),aw=actWp();var vis=wpts.filter(w=>passFilter(w,true));
    if(!vis.length){host.innerHTML='<div class="empty">Nessun waypoint. Alt-click o pressione lunga sulla carta, "＋ WP qui" o "＋ per coordinate".</div>';return;}
    vis.forEach(function(w){var d='',b='';if(POS){var dist=hav(POS,[w.lat,w.lon])/1852;d=dist.toFixed(dist<10?2:1)+' NM';b=String(Math.round(brng(POS,[w.lat,w.lon]))).padStart(3,'0')+'°';}
      var it=document.createElement('div');it.className='item'+(w.id===aw?' active':'');
      it.innerHTML='<input type="checkbox" class="chk"><span class="dot" style="background:'+tagColor(w.tag)+'" title="'+esc(tagName(w.tag))+'"></span>'+
        '<div class="it-main"><div class="it-name">'+esc(w.name)+'</div><div class="it-sub">'+(POS?('dist '+d+' · rlv '+b):(w.lat.toFixed(4)+', '+w.lon.toFixed(4)))+'</div>'+(w.note?'<div class="it-note">'+esc(w.note)+'</div>':'')+'</div>'+
        '<div class="it-acts"><button class="iconbtn act'+(w.id===aw?' on':'')+'" title="Attiva">◎</button><button class="iconbtn ed" title="Modifica">✎</button><button class="iconbtn del" title="Elimina">🗑</button></div>';
      it.querySelector('.chk').checked=!!sel.wpt[w.id];it.querySelector('.chk').onchange=function(){sel.wpt[w.id]=this.checked;};
      it.querySelector('.act').onclick=function(){setActiveWp(w.id===aw?'':w.id);};
      it.querySelector('.ed').onclick=function(){openEdit(w);};
      it.querySelector('.del').onclick=function(){if(confirm('Eliminare "'+w.name+'"?')){lsSet('raffyca-waypoints',wpts.filter(x=>x.id!==w.id));if(w.id===aw)localStorage.setItem('raffyca-active-wp','');render();}};
      it.querySelector('.it-main').ondblclick=function(){map.setView([w.lat,w.lon],15);$('map').scrollIntoView({behavior:'smooth',block:'nearest'});};
      host.appendChild(it);});
  }else{var trks=lsGet('raffyca-tracks'),at=actTrk();var vis=trks.filter(t=>passFilter(t,false));
    if(!vis.length){host.innerHTML='<div class="empty">Nessuna traccia registrata.</div>';return;}
    vis.forEach(function(t){var it=document.createElement('div');it.className='item'+(t.id===at?' active':'');
      it.innerHTML='<input type="checkbox" class="chk"><span class="dot" style="background:'+tagColor(t.tag)+'" title="'+esc(tagName(t.tag))+'"></span>'+
        '<div class="it-main"><div class="it-name">'+esc(t.name)+'</div><div class="it-sub">'+((t.dist!=null?(+t.dist).toFixed(1)+' NM · ':'')+fmtDur(t.dur))+' · '+((t.pts&&t.pts.length)||0)+' pt</div>'+(t.note?'<div class="it-note">'+esc(t.note)+'</div>':'')+'</div>'+
        '<div class="it-acts"><button class="iconbtn act'+(t.id===at?' on':'')+'" title="Traccia attiva">◎</button><button class="iconbtn ed" title="Modifica">✎</button><button class="iconbtn del" title="Elimina">🗑</button></div>';
      it.querySelector('.chk').checked=!!sel.trk[t.id];it.querySelector('.chk').onchange=function(){sel.trk[t.id]=this.checked;};
      it.querySelector('.act').onclick=function(){setActiveTrk(t.id===at?'':t.id);};
      it.querySelector('.ed').onclick=function(){openEditTrk(t);};
      it.querySelector('.del').onclick=function(){if(confirm('Eliminare "'+t.name+'"?')){lsSet('raffyca-tracks',trks.filter(x=>x.id!==t.id));if(t.id===at)localStorage.setItem('raffyca-active-track','');render();}};
      it.querySelector('.it-main').ondblclick=function(){if(t.pts&&t.pts.length>=2){map.fitBounds(L.latLngBounds(t.pts.map(p=>[p[0],p[1]])).pad(0.25));}else if(t.pts&&t.pts.length){map.setView([t.pts[0][0],t.pts[0][1]],14);}$('map').scrollIntoView({behavior:'smooth',block:'nearest'});};
      host.appendChild(it);});}}

function render(){$('nW').textContent=lsGet('raffyca-waypoints').length;$('nT').textContent=lsGet('raffyca-tracks').length;rebuildFilter();updatePosInfo();draw();renderList();}

/* modale */
var editing=null, pendTag="#8aa0b0";
function buildTagChips(cur){$('ovTags').innerHTML='';var m=tagsMap();
  TAGS.forEach(function(t){var c=document.createElement('div');c.className='tagchip'+(t[0]===cur?' sel':'');c.style.background=t[0];c.title=m[t[0]]||t[1];
    c.onclick=function(){pendTag=t[0];[...$('ovTags').children].forEach(x=>x.classList.remove('sel'));c.classList.add('sel');$('ovTagName').value=tagsMap()[t[0]]||'';};
    $('ovTags').appendChild(c);});
  $('ovTagName').value=tagsMap()[cur]||'';}
function showCoordField(on){$('ovCoordField').style.display=on?'':'none';}
function openCreate(lat,lon){editing=null;pendTag="#8aa0b0";$('ovTitle').textContent='Nuovo waypoint';showCoordField(true);
  $('ovLat').value=lat!=null?(+lat).toFixed(5):'';$('ovLon').value=lon!=null?(+lon).toFixed(5):'';$('ovCoordHint').textContent='';
  $('ovName').value='WP '+(lsGet('raffyca-waypoints').length+1);$('ovNote').value='';buildTagChips(pendTag);$('ov').classList.add('on');}
function openEdit(w){editing={type:'wpt',id:w.id};pendTag=w.tag||"#8aa0b0";$('ovTitle').textContent='Modifica waypoint';showCoordField(true);
  $('ovLat').value=w.lat.toFixed(5);$('ovLon').value=w.lon.toFixed(5);$('ovCoordHint').textContent='';
  $('ovName').value=w.name;$('ovNote').value=w.note||'';buildTagChips(pendTag);$('ov').classList.add('on');}
function openEditTrk(t){editing={type:'trk',id:t.id};pendTag=t.tag||"#8aa0b0";$('ovTitle').textContent='Modifica traccia';showCoordField(false);
  $('ovName').value=t.name;$('ovNote').value=t.note||'';buildTagChips(pendTag);$('ov').classList.add('on');}
$('ovCancel').onclick=function(){$('ov').classList.remove('on');};
$('ovSave').onclick=function(){
  var name=$('ovName').value.trim()||'Senza nome',note=$('ovNote').value.trim();
  setTagName(pendTag,$('ovTagName').value);
  if(editing&&editing.type==='trk'){var trks=lsGet('raffyca-tracks');var t=trks.find(x=>x.id===editing.id);if(t){t.name=name;t.note=note;t.tag=pendTag;lsSet('raffyca-tracks',trks);}}
  else{
    var la=parseCoord($('ovLat').value),lo=parseCoord($('ovLon').value);
    if(!isFinite(la)||!isFinite(lo)||Math.abs(la)>90||Math.abs(lo)>180){$('ovCoordHint').textContent='⚠ Coordinate non valide.';$('ovCoordHint').style.color='#FF6B6B';return;}
    if(editing&&editing.type==='wpt'){var wp=lsGet('raffyca-waypoints');var w=wp.find(x=>x.id===editing.id);if(w){w.name=name;w.note=note;w.tag=pendTag;w.lat=la;w.lon=lo;lsSet('raffyca-waypoints',wp);}}
    else{var w2=lsGet('raffyca-waypoints');w2.push({id:'w'+Date.now(),name:name,lat:la,lon:lo,ts:Date.now(),tag:pendTag,note:note});lsSet('raffyca-waypoints',w2);}
  }
  $('ov').classList.remove('on');render();};

/* interazioni */
$('tGrid').onclick=function(){gridOn=!gridOn;this.classList.toggle('on',gridOn);if(gridOn){gridLayer.addTo(map);drawGrid();}else map.removeLayer(gridLayer);};
$('tZone').onclick=function(){zonesOn=!zonesOn;this.classList.toggle('on',zonesOn);if(zonesOn){zoneLayer.addTo(map);drawZones();}else map.removeLayer(zoneLayer);};
/* ===== Isobate (batimetria per zona, EMODnet) ===== */
var ISO_COL={"-5":"#8fe3ff","-10":"#2BD9C4","-20":"#46d68a","-50":"#FFC24B","-100":"#FF6B6B","-200":"#c792ea","-500":"#f78fb3","-1000":"#9aa7ff"};
var ISO_SLUG={"Alto Adriatico":"alto_adriatico","Medio Adriatico":"medio_adriatico","Basso Adriatico":"basso_adriatico","Mar Ionio":"mar_ionio","Basso Tirreno":"basso_tirreno","Alto Tirreno":"alto_tirreno","Mar Ligure":"mar_ligure","Sardegna":"sardegna","Sicilia":"sicilia"};
var isoOn=false, isoLayer=L.layerGroup(), isoCache={}, isoCurSlug=null;
function isoZoneAt(lat,lon){var hit=null;Object.keys(ZONE_BOX).forEach(function(z){var b=ZONE_BOX[z];if(!hit&&lat<=b.latN&&lat>=b.latS&&lon>=b.lonW&&lon<=b.lonE)hit=z;});return hit;}
function isoStyleF(f){var d=f.properties.depth;return{color:(ISO_COL[String(d)]||"#6b7f95"),weight:(d>=-50?1.1:0.8),opacity:.85};}
function isoRender(j){
  isoLayer.clearLayers();
  L.geoJSON(j,{style:function(){return{color:"#000",weight:12,opacity:0};},onEachFeature:function(f,layer){layer.bindPopup((-f.properties.depth)+" m");}}).addTo(isoLayer);
  L.geoJSON(j,{interactive:false,style:isoStyleF}).addTo(isoLayer);
  var lab=[-5,-10,-20,-50,-100,-200,-500],byd={};
  (j.features||[]).forEach(function(f){var d=f.properties.depth;if(lab.indexOf(d)<0)return;var g=f.geometry;if(!g)return;var cs=g.type==="LineString"?g.coordinates:(g.coordinates[0]||[]);if(cs.length<8)return;(byd[d]=byd[d]||[]).push(cs);});
  Object.keys(byd).forEach(function(d){byd[d].sort(function(a,b){return b.length-a.length;});byd[d].slice(0,3).forEach(function(cs){var m=cs[Math.floor(cs.length/2)];L.marker([m[1],m[0]],{interactive:false,keyboard:false,icon:L.divIcon({className:"",html:'<span style="font:600 10px var(--mono,monospace);color:'+(ISO_COL[String(d)]||"#9fb0c0")+';background:rgba(6,14,24,.72);padding:0 3px;border-radius:3px">'+(-d)+'</span>',iconSize:[26,12]})}).addTo(isoLayer);});});
}
function isoRefresh(){
  if(!isoOn)return;
  var c=map.getCenter(),z=isoZoneAt(c.lat,c.lng),slug=z?ISO_SLUG[z]:null;
  if(!slug)return;
  if(slug===isoCurSlug)return;
  isoCurSlug=slug;
  if(isoCache[slug]){isoRender(isoCache[slug]);return;}
  fetch("../routing/isobate/isobate_"+slug+".geojson").then(function(r){return r.json();}).then(function(j){isoCache[slug]=j;if(isoOn&&isoCurSlug===slug)isoRender(j);}).catch(function(){});
}
$('tBathy').onclick=function(){isoOn=!isoOn;this.classList.toggle('on',isoOn);var lg=document.getElementById('isoLegend');if(lg)lg.style.display=isoOn?'block':'none';if(isoOn){isoLayer.addTo(map);isoCurSlug=null;isoRefresh();}else{map.removeLayer(isoLayer);isoLayer.clearLayers();isoCurSlug=null;}};
map.on('moveend',function(){if(isoOn)isoRefresh();});
$('tDraw').onclick=function(){if(mapMode==='draw')setMode('normal');else startDraw();};
$('tMeas').onclick=function(){if(mapMode==='meas')setMode('normal');else startMeas();};
$('tAis').onclick=function(){if(aisOn){aisStop();this.classList.remove('on');$('aisCtl').style.display='none';}
  else{if(aisStart()){this.classList.add('on');$('aisCtl').style.display='';}}};
$('aisKeyBtn').onclick=function(){var k=prompt('API key AISstream.io:',aisKey());if(k===null)return;k=k.trim();localStorage.setItem('raffyca-ais-key',k);
  if(aisOn){aisStop();$('tAis').classList.remove('on');$('aisCtl').style.display='none';if(k&&aisStart()){$('tAis').classList.add('on');$('aisCtl').style.display='';}}};
$('drawUndo').onclick=drawUndo;
$('drawCancel').onclick=function(){setMode('normal');};
$('drawDone').onclick=function(){if(endDraw(true))setMode('normal');};
$('measCancel').onclick=function(){setMode('normal');};
$('addHere').onclick=function(){if(POS)openCreate(POS[0],POS[1]);else if(navigator.geolocation)navigator.geolocation.getCurrentPosition(function(p){openCreate(p.coords.latitude,p.coords.longitude);},function(){openCreate(map.getCenter().lat,map.getCenter().lng);});else openCreate(map.getCenter().lat,map.getCenter().lng);};
$('addCoord').onclick=function(){openCreate(null,null);};
$('filter').onchange=render;
$('tabWpt').onclick=function(){tab='wpt';$('tabWpt').classList.add('on');$('tabTrk').classList.remove('on');renderList();};
$('tabTrk').onclick=function(){tab='trk';$('tabTrk').classList.add('on');$('tabWpt').classList.remove('on');renderList();};

/* export selezionati */
$('expSel').onclick=function(){var wpts=lsGet('raffyca-waypoints').filter(w=>sel.wpt[w.id]),trks=lsGet('raffyca-tracks').filter(t=>sel.trk[t.id]);
  if(!wpts.length&&!trks.length){alert('Seleziona prima waypoint o tracce (le caselle a sinistra).');return;}
  var g='<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="ProVela" xmlns="http://www.topografix.com/GPX/1/1">\n';
  wpts.forEach(w=>{g+='<wpt lat="'+w.lat+'" lon="'+w.lon+'"><name>'+esc(w.name)+'</name>'+(w.note?'<desc>'+esc(w.note)+'</desc>':'')+'</wpt>\n';});
  trks.forEach(t=>{g+='<trk><name>'+esc(t.name)+'</name><trkseg>\n';(t.pts||[]).forEach(p=>{g+='<trkpt lat="'+p[0]+'" lon="'+p[1]+'"></trkpt>\n';});g+='</trkseg></trk>\n';});
  g+='</gpx>';var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([g],{type:'application/gpx+xml'}));a.download='carta-export.gpx';a.click();};

/* import GPX */
$('impGpx').onclick=function(){$('fileGpx').click();};
$('fileGpx').onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();
  r.onload=function(){try{var doc=new DOMParser().parseFromString(r.result,'application/xml');
    var wpts=lsGet('raffyca-waypoints'),aw=0;
    doc.querySelectorAll('wpt').forEach(function(n){var la=+n.getAttribute('lat'),lo=+n.getAttribute('lon');if(!isFinite(la))return;
      var nm=(n.querySelector('name')||{}).textContent||'WP';var ds=(n.querySelector('desc')||{}).textContent||'';
      wpts.push({id:'w'+Date.now()+Math.random().toString(36).slice(2,5),name:nm,lat:la,lon:lo,ts:Date.now(),note:ds});aw++;});
    if(aw)lsSet('raffyca-waypoints',wpts);
    var trks=lsGet('raffyca-tracks'),at=0;
    doc.querySelectorAll('trk').forEach(function(tn){var pts=[];tn.querySelectorAll('trkpt').forEach(function(p){pts.push([+p.getAttribute('lat'),+p.getAttribute('lon'),0]);});
      if(pts.length){var nm=(tn.querySelector('name')||{}).textContent||'Traccia';trks.push({id:'t'+Date.now()+Math.random().toString(36).slice(2,5),name:nm,ts:Date.now(),pts:pts,dist:null,dur:0});at++;}});
    if(at)lsSet('raffyca-tracks',trks);render();alert('Importati: '+aw+' waypoint, '+at+' tracce.');
  }catch(err){alert('GPX non valido: '+err.message);}};r.readAsText(f);e.target.value='';};

render();
setTimeout(function(){map.invalidateSize();if(POS)map.setView(POS,12);},300);
</script>
